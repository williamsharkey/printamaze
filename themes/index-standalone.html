                    seed,
                    theme: ALL_THEMES[Math.floor(rng.next() * ALL_THEMES.length)],
                    shape: ALL_SHAPES[Math.floor(rng.next() * ALL_SHAPES.length)],
                    algorithm: ALL_ALGORITHMS[Math.floor(rng.next() * ALL_ALGORITHMS.length)]
                });
            }
        }

        function renderMazes() {
            const container = document.getElementById('mazeContainer');
            container.innerHTML = '';

            mazeParams.forEach((params, idx) => {
                const frame = createMazeFrame(params, idx);
                container.appendChild(frame);
            });
        }

        // Minimum distance between start and end (in inches)
        const MIN_START_END_DISTANCE_INCHES = 5;
        const MAX_MAZE_RETRIES = 4;

        function generateMazeWithDistanceCheck(params, levelNum) {
            let bestMaze = null;
            let bestParams = params;
            let bestDistance = 0;

            for (let attempt = 0; attempt < MAX_MAZE_RETRIES; attempt++) {
                // First attempt uses original params, subsequent use random style but keep same seed
                let tryParams = params;
                if (attempt > 0) {
                    const rng = createSeededRandom(params.seed * 1000 + attempt);
                    tryParams = {
                        seed: params.seed,
                        theme: ALL_THEMES[Math.floor(rng.next() * ALL_THEMES.length)],
                        shape: ALL_SHAPES[Math.floor(rng.next() * ALL_SHAPES.length)],
                        algorithm: ALL_ALGORITHMS[Math.floor(rng.next() * ALL_ALGORITHMS.length)]
                    };
                }

                const dims = findMazeDimensions(tryParams.seed, currentDifficulty, tryParams.shape, tryParams.algorithm);
                const gen = createMazeGenerator(tryParams.seed);
                const maze = gen.generateWithStory(dims.w, dims.h, tryParams.algorithm, tryParams.shape, tryParams.theme, false, levelNum);

                const distance = maze.startEndDistanceInches || 0;

                // Track best attempt
                if (distance > bestDistance) {
                    bestDistance = distance;
                    bestMaze = maze;
                    bestParams = tryParams;
                }

                // If distance meets minimum, use this maze
                if (distance >= MIN_START_END_DISTANCE_INCHES) {
                    return { maze, params: tryParams };
                }
            }

            // No attempt met minimum - use the best one we found
            return { maze: bestMaze, params: bestParams };
        }

        function createMazeFrame(params, idx) {
            const levelNum = currentDifficulty - 2;

            // Generate maze with distance validation and retry logic
            const result = generateMazeWithDistanceCheck(params, levelNum);
            const maze = result.maze;
            params = result.params; // May have changed if retried
            mazeParams[idx] = params; // Keep mazeParams in sync

            window.mazeCache = window.mazeCache || {};
            window.mazeCache[params.seed] = { maze, params, difficulty: currentDifficulty };

            const frame = document.createElement('div');
            frame.className = 'maze-frame';
            frame.dataset.seed = params.seed;
            frame.dataset.idx = idx;
            frame.dataset.theme = params.theme;

            // Heart button
            const heart = document.createElement('button');
            heart.className = 'heart-btn' + (isFavorited(params.seed) ? ' favorited' : '');
            heart.innerHTML = '♥';
            heart.onclick = (e) => {
                e.stopPropagation();
                toggleFavorite(params.seed, heart);
            };
            frame.appendChild(heart);

            // Favorites trigger (upper left) - only show if there are favorites
            const favCount = getFavorites().length;
            if (favCount > 0) {
                const favsTrigger = document.createElement('button');
                favsTrigger.className = 'favs-trigger';
                favsTrigger.innerHTML = `<span class="arrow">↑</span><span class="count">${favCount} FAVS</span>`;
                favsTrigger.onclick = (e) => {
                    e.stopPropagation();
                    document.getElementById('mazeContainer').scrollTo({ top: 0, behavior: 'smooth' });
                    setTimeout(showFavorites, 300);
                };
                frame.appendChild(favsTrigger);
            }

            // Fade container for maze
            const fadeContainer = document.createElement('div');
            fadeContainer.className = 'maze-fade-container';
            fadeContainer.dataset.seed = params.seed;

            // Maze SVG
            const svgContainer = document.createElement('div');
            svgContainer.className = 'maze-svg-container';
            svgContainer.innerHTML = maze.toSVG(false, false);
            svgContainer.onclick = (e) => {
                if (e.target.closest('.heart-btn')) return;
                if (e.target.closest('.favs-trigger')) return;
                if (e.target.closest('.difficulty-btn')) return;
                if (!e.target.closest('svg')) return;
                activeMazeId = params.seed;
                openActionMenu();
            };
            fadeContainer.appendChild(svgContainer);
            frame.appendChild(fadeContainer);

            // Bottom controls
            const bottomControls = document.createElement('div');
            bottomControls.className = 'bottom-controls';

            // Difficulty number
            const diffNum = document.createElement('div');
            diffNum.className = 'difficulty-number';
            diffNum.textContent = `Difficulty ${currentDifficulty - 2}`;
            bottomControls.appendChild(diffNum);

            // Difficulty row: - button, dots, + button
            const difficultyRow = document.createElement('div');
            difficultyRow.className = 'difficulty-row';

            // Minus button - fire on touchstart/mousedown for immediate response
            const minusBtn = document.createElement('button');
            minusBtn.className = 'difficulty-btn minus' + (currentDifficulty <= 3 ? ' hidden' : '');
            minusBtn.innerHTML = '−';
            minusBtn.onmousedown = decreaseDifficulty;
            minusBtn.ontouchstart = (e) => { e.preventDefault(); decreaseDifficulty(e); };
            difficultyRow.appendChild(minusBtn);

            // Level dots (between buttons)
            const levelIndicator = document.createElement('div');
            levelIndicator.className = 'level-indicator';
            for (let i = 3; i <= 17; i++) {
                const dot = document.createElement('div');
                dot.className = 'level-dot' + (i === currentDifficulty ? ' active' : '');
                levelIndicator.appendChild(dot);
            }
            difficultyRow.appendChild(levelIndicator);

            // Plus button - fire on touchstart/mousedown for immediate response
            const plusBtn = document.createElement('button');
            plusBtn.className = 'difficulty-btn plus' + (currentDifficulty >= 17 ? ' hidden' : '');
            plusBtn.innerHTML = '+';
            plusBtn.onmousedown = increaseDifficulty;
            plusBtn.ontouchstart = (e) => { e.preventDefault(); increaseDifficulty(e); };
            difficultyRow.appendChild(plusBtn);

            bottomControls.appendChild(difficultyRow);
            frame.appendChild(bottomControls);

            return frame;
        }

        function handleScroll() {
            const container = document.getElementById('mazeContainer');
            const scrollPos = container.scrollTop;
            const frameHeight = window.innerHeight;
            const newIndex = Math.round(scrollPos / frameHeight);

            if (newIndex !== currentIndex) {
                currentIndex = newIndex;
                localStorage.setItem('mazejs-currentIndex', currentIndex.toString());

                // Update navigation arrows visibility
                updateNavArrows(currentIndex);

                // Update background tint based on current maze theme
                if (mazeParams[currentIndex]) {
                    updateBackgroundTint(mazeParams[currentIndex].theme);
                }

                // Precompute adjacent mazes after page change
                schedulePrecomputation();

                // If scrolled to a stale frame, regenerate it immediately
                const frame = container.children[currentIndex];
                if (frame && frame.dataset.staleDifficulty) {
                    updateFrameMaze(frame);
                }
            }

            // Load more mazes when near the end
            if (currentIndex >= mazeParams.length - 5) {
                generateMazeParams(10);
                const existingFrames = container.children.length;
                for (let i = existingFrames; i < mazeParams.length; i++) {
                    container.appendChild(createMazeFrame(mazeParams[i], i));
                }
            }
        }

        // Debounce flag to prevent rapid button spam
        let difficultyChanging = false;

        function decreaseDifficulty(e) {
            e.stopPropagation();
            if (e.cancelable) e.preventDefault();
            if (difficultyChanging) return;
            if (currentDifficulty > 3) {
                changeDifficulty(currentDifficulty - 1);
            }
        }

        function increaseDifficulty(e) {
            e.stopPropagation();
            if (e.cancelable) e.preventDefault();
            if (difficultyChanging) return;
            if (currentDifficulty < 17) {
                changeDifficulty(currentDifficulty + 1);
            }
        }

        function changeDifficulty(newDifficulty) {
            // Debounce: prevent rapid changes
            difficultyChanging = true;
            setTimeout(() => { difficultyChanging = false; }, 250);
            currentDifficulty = newDifficulty;
            localStorage.setItem('mazejs-difficulty', currentDifficulty.toString());

            const container = document.getElementById('mazeContainer');
            const frames = Array.from(container.querySelectorAll('.maze-frame'));

            // Update ALL frames' UI controls immediately (cheap DOM updates)
            frames.forEach((frame) => {
                const minusBtn = frame.querySelector('.difficulty-btn.minus');
                const plusBtn = frame.querySelector('.difficulty-btn.plus');
                if (minusBtn) minusBtn.classList.toggle('hidden', currentDifficulty <= 3);
                if (plusBtn) plusBtn.classList.toggle('hidden', currentDifficulty >= 17);

                const dots = frame.querySelectorAll('.level-dot');
                dots.forEach((dot, i) => {
                    dot.classList.toggle('active', (i + 3) === currentDifficulty);
                });

                const diffNum = frame.querySelector('.difficulty-number');
                if (diffNum) diffNum.textContent = `Difficulty ${currentDifficulty - 2}`;

                // Mark frame as needing maze regeneration
                frame.dataset.staleDifficulty = currentDifficulty;
            });

            // Generate ONLY the visible frame immediately
            const visibleFrame = frames[currentIndex];
            if (visibleFrame) {
                updateFrameMaze(visibleFrame);
            }

            // Defer nearby frames, then remaining frames via idle callbacks
            const nearby = [currentIndex - 1, currentIndex + 1].filter(i => i >= 0 && i < frames.length && i !== currentIndex);
            const rest = [];
            for (let i = 0; i < frames.length; i++) {
                if (i !== currentIndex && !nearby.includes(i)) rest.push(i);
            }

            // Adjacent frames: generate after a microtask so visible frame paints first
            if (nearby.length > 0) {
                requestAnimationFrame(() => {
                    nearby.forEach(i => {
                        if (frames[i] && frames[i].dataset.staleDifficulty == currentDifficulty) {
                            updateFrameMaze(frames[i]);
                        }
                    });
                    // Then schedule remaining frames in idle time
                    scheduleStaleFrameUpdates(frames, rest);
                });
            } else {
                scheduleStaleFrameUpdates(frames, rest);
            }

            // Precompute adjacent difficulties for new level
            schedulePrecomputation();
        }

        function scheduleStaleFrameUpdates(frames, indices) {
            if (indices.length === 0) return;
            const batch = indices.splice(0, 2); // process 2 frames per idle callback
            scheduleIdleWork(() => {
                batch.forEach(i => {
                    if (frames[i] && frames[i].dataset.staleDifficulty == currentDifficulty) {
                        updateFrameMaze(frames[i]);
                    }
                });
                if (indices.length > 0) {
                    scheduleStaleFrameUpdates(frames, indices);
                }
            });
        }

        function updateFrameMaze(frame) {
            try {
                const fadeContainer = frame.querySelector('.maze-fade-container');
                if (!fadeContainer) return;

                const seed = parseInt(fadeContainer.dataset.seed);
                const params = mazeParams.find(p => p.seed === seed);
                if (!params) return;

                // Try precomputed cache first for instant response
                let newMaze;
                const precomputed = getPrecomputedMaze(seed, currentDifficulty);
                if (precomputed) {
                    newMaze = precomputed.maze;
                } else {
                    const dims = findMazeDimensions(params.seed, currentDifficulty, params.shape, params.algorithm);
                    const levelNum = currentDifficulty - 2;
                    const gen = createMazeGenerator(params.seed);
                    newMaze = gen.generateWithStory(dims.w, dims.h, params.algorithm, params.shape, params.theme, false, levelNum);
                }

                // Update cache
                window.mazeCache[params.seed] = { maze: newMaze, params, difficulty: currentDifficulty };

                // Create new SVG container as overlay (starts invisible)
                const newSvgContainer = document.createElement('div');
                newSvgContainer.className = 'maze-svg-container fade-overlay';
                newSvgContainer.innerHTML = newMaze.toSVG(false, false);
                newSvgContainer.onclick = (e) => {
                    if (e.target.closest('.heart-btn')) return;
                    if (e.target.closest('.favs-trigger')) return;
                    if (e.target.closest('.difficulty-btn')) return;
                    if (!e.target.closest('svg')) return;
                    activeMazeId = params.seed;
                    openActionMenu();
                };

                fadeContainer.appendChild(newSvgContainer);

                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        newSvgContainer.classList.add('fade-in');
                        setTimeout(() => {
                            const oldContainers = fadeContainer.querySelectorAll('.maze-svg-container:not(.fade-overlay)');
                            oldContainers.forEach(c => c.remove());
                            newSvgContainer.classList.remove('fade-overlay', 'fade-in');
                        }, 200);
                    });
                });

                // Clear stale marker
                delete frame.dataset.staleDifficulty;
            } catch (e) {
                console.error('Error updating maze frame:', e);
            }
        }

        // Precomputation system for adjacent mazes
        let precomputeTimer = null;
        const precomputeCache = new Map(); // key: "seed-difficulty" -> maze object

        function getPrecomputeKey(seed, difficulty) {
            return `${seed}-${difficulty}`;
        }

        function schedulePrecomputation() {
            // Cancel any pending precomputation
            if (precomputeTimer) clearTimeout(precomputeTimer);

            // Schedule precomputation after 300ms idle
            precomputeTimer = setTimeout(() => {
                precomputeAdjacentMazes();
            }, 300);
        }

        function precomputeAdjacentMazes() {
            // Get current visible maze params
            const params = mazeParams[currentIndex];
            if (!params) return;

            const seed = params.seed;
            const toPrecompute = [];

            // Add n-1 and n+1 difficulty levels
            if (currentDifficulty > 3) {
                toPrecompute.push({ seed, difficulty: currentDifficulty - 1, params });
            }
            if (currentDifficulty < 17) {
                toPrecompute.push({ seed, difficulty: currentDifficulty + 1, params });
            }

            // Add previous and next page mazes at current difficulty
            if (currentIndex > 0 && mazeParams[currentIndex - 1]) {
                const prevParams = mazeParams[currentIndex - 1];
                toPrecompute.push({ seed: prevParams.seed, difficulty: currentDifficulty, params: prevParams });
            }
            if (mazeParams[currentIndex + 1]) {
                const nextParams = mazeParams[currentIndex + 1];
                toPrecompute.push({ seed: nextParams.seed, difficulty: currentDifficulty, params: nextParams });
            }

            // Precompute in idle time using requestIdleCallback or setTimeout fallback
            const computeNext = () => {
                if (toPrecompute.length === 0) return;

                const item = toPrecompute.shift();
                const key = getPrecomputeKey(item.seed, item.difficulty);

                // Skip if already cached
                if (precomputeCache.has(key)) {
                    if (toPrecompute.length > 0) {
                        scheduleIdleWork(computeNext);
                    }
                    return;
                }

                // Skip if already in main cache at this difficulty
                const mainCached = window.mazeCache[item.seed];
                if (mainCached && mainCached.difficulty === item.difficulty) {
                    if (toPrecompute.length > 0) {
                        scheduleIdleWork(computeNext);
                    }
                    return;
                }

                // Generate maze
                try {
                    const dims = findMazeDimensions(item.seed, item.difficulty, item.params.shape, item.params.algorithm);
                    const levelNum = item.difficulty - 2;
                    const gen = createMazeGenerator(item.seed);
                    const maze = gen.generateWithStory(dims.w, dims.h, item.params.algorithm, item.params.shape, item.params.theme, false, levelNum);

                    // Cache the result
                    precomputeCache.set(key, { maze, params: item.params, difficulty: item.difficulty });

                    // Limit cache size to 20 entries
                    if (precomputeCache.size > 20) {
                        const firstKey = precomputeCache.keys().next().value;
                        precomputeCache.delete(firstKey);
                    }
                } catch (e) {
                    // Ignore precompute errors
                }

                // Continue with next item
                if (toPrecompute.length > 0) {
                    scheduleIdleWork(computeNext);
                }
            };

            // Start precomputation
            if (toPrecompute.length > 0) {
                scheduleIdleWork(computeNext);
            }
        }

        function scheduleIdleWork(fn) {
            if (window.requestIdleCallback) {
                requestIdleCallback(fn, { timeout: 1000 });
            } else {
                setTimeout(fn, 50);
            }
        }

        // Use precomputed maze if available
        function getPrecomputedMaze(seed, difficulty) {
            const key = getPrecomputeKey(seed, difficulty);
            return precomputeCache.get(key);
        }

        // Favorites
        function getFavorites() {
            try {
                return JSON.parse(localStorage.getItem('mazejs-favorites') || '[]');
            } catch { return []; }
        }

        function saveFavorites(favs) {
            localStorage.setItem('mazejs-favorites', JSON.stringify(favs));
        }

        function isFavorited(seed) {
            return getFavorites().some(f => f.seed === seed);
        }

        function toggleFavorite(seed, btn) {
            const cached = window.mazeCache[seed];
            if (!cached) return;

            let favs = getFavorites();
            const idx = favs.findIndex(f => f.seed === seed);

            if (idx >= 0) {
                favs.splice(idx, 1);
                btn.classList.remove('favorited');
            } else {
                favs.unshift({
                    seed,
                    theme: cached.params.theme,
                    shape: cached.params.shape,
                    algorithm: cached.params.algorithm,
                    difficulty: cached.difficulty,
                    savedAt: Date.now()
                });
                btn.classList.add('favorited');
            }
            saveFavorites(favs);

            // Update favs triggers in all visible frames
            updateFavsTriggers();
        }

        function updateFavsTriggers() {
            const favCount = getFavorites().length;
            const frames = document.querySelectorAll('.maze-frame');
            frames.forEach(frame => {
                let trigger = frame.querySelector('.favs-trigger');
                if (favCount > 0) {
                    if (!trigger) {
                        trigger = document.createElement('button');
                        trigger.className = 'favs-trigger';
                        trigger.onclick = (e) => {
                            e.stopPropagation();
                            document.getElementById('mazeContainer').scrollTo({ top: 0, behavior: 'smooth' });
                            setTimeout(showFavorites, 300);
                        };
                        frame.appendChild(trigger);
                    }
                    trigger.innerHTML = `<span class="arrow">↑</span><span class="count">${favCount} FAVS</span>`;
                } else if (trigger) {
                    trigger.remove();
                }
            });
        }

        function showFavorites() {
            const section = document.getElementById('favoritesSection');
            const grid = document.getElementById('favGrid');
            const noFavs = document.getElementById('noFavs');
            const favs = getFavorites();

            grid.innerHTML = '';

            if (favs.length === 0) {
                noFavs.style.display = 'block';
            } else {
                noFavs.style.display = 'none';
                favs.forEach(fav => {
                    const dims = findMazeDimensions(fav.seed, fav.difficulty || 4, fav.shape, fav.algorithm);
                    const gen = createMazeGenerator(fav.seed);
                    const maze = gen.generateWithStory(dims.w, dims.h, fav.algorithm, fav.shape, fav.theme, false, (fav.difficulty || 4) - 2);

                    const item = document.createElement('div');
                    item.className = 'fav-item';
                    item.innerHTML = maze.toSVG(false, false);
                    item.onclick = () => {
                        closeFavorites();
                        scrollToSeed(fav.seed);
                    };
                    grid.appendChild(item);
                });
            }

            section.classList.add('open');

            setTimeout(() => {
                document.addEventListener('click', closeFavoritesOnOutsideClick);
            }, 100);
        }

        function closeFavorites() {
            document.getElementById('favoritesSection').classList.remove('open');
            document.removeEventListener('click', closeFavoritesOnOutsideClick);
        }

        function closeFavoritesOnOutsideClick(e) {
            if (!e.target.closest('#favoritesSection')) {
                closeFavorites();
            }
        }

        function scrollToSeed(seed) {
            const fav = getFavorites().find(f => f.seed === seed);

            if (fav && fav.difficulty && fav.difficulty !== currentDifficulty) {
                currentDifficulty = fav.difficulty;
            }

            let idx = mazeParams.findIndex(p => p.seed === seed);
            if (idx === -1) {
                if (fav) {
                    mazeParams.unshift({ seed, theme: fav.theme, shape: fav.shape, algorithm: fav.algorithm });
                    idx = 0;
                }
            }

            renderMazes();

            if (idx >= 0) {
                document.getElementById('mazeContainer').children[idx].scrollIntoView({ behavior: 'smooth' });
            }
        }

        // Action menu
        function openActionMenu() {
            updateMenuHeartButton();
            document.getElementById('actionMenu').classList.add('open');
        }

        function closeActionMenu() {
            document.getElementById('actionMenu').classList.remove('open');
        }

        function toggleFavoriteFromMenu() {
            const cached = window.mazeCache[activeMazeId];
            if (!cached) return;

            const frame = document.querySelector(`.maze-frame[data-seed="${activeMazeId}"]`);
            const heartBtn = frame ? frame.querySelector('.heart-btn') : null;

            let favs = getFavorites();
            const idx = favs.findIndex(f => f.seed === activeMazeId);
            const menuBtn = document.getElementById('menuHeartBtn');

            if (idx >= 0) {
                favs.splice(idx, 1);
                if (heartBtn) heartBtn.classList.remove('favorited');
                if (menuBtn) menuBtn.textContent = '♥ Save to Favorites';
            } else {
                favs.unshift({
                    seed: activeMazeId,
                    theme: cached.params.theme,
                    shape: cached.params.shape,
                    algorithm: cached.params.algorithm,
                    difficulty: cached.difficulty,
                    savedAt: Date.now()
                });
                if (heartBtn) heartBtn.classList.add('favorited');
                if (menuBtn) menuBtn.textContent = '♥ Saved!';
            }
            saveFavorites(favs);
            updateFavsTriggers();

            setTimeout(closeActionMenu, 300);
        }

        function updateMenuHeartButton() {
            const menuBtn = document.getElementById('menuHeartBtn');
            if (menuBtn && activeMazeId) {
                const isFav = isFavorited(activeMazeId);
                menuBtn.textContent = isFav ? '♥ Saved!' : '♥ Save to Favorites';
            }
        }

        // Print mode
        function openPrintMode(bwMode) {
            const cached = window.mazeCache[activeMazeId];
            if (!cached) return;

            autoFavorite(activeMazeId);

            const printContent = document.getElementById('printContent');
            printContent.innerHTML = cached.maze.toSVG(false, bwMode);
            document.getElementById('printOverlay').classList.add('open');

            setTimeout(() => window.print(), 100);
        }

        function autoFavorite(seed) {
            if (isFavorited(seed)) return;
            const cached = window.mazeCache[seed];
            if (!cached) return;

            let favs = getFavorites();
            favs.unshift({
                seed: seed,
                theme: cached.params.theme,
                shape: cached.params.shape,
                algorithm: cached.params.algorithm,
                difficulty: cached.difficulty,
                savedAt: Date.now()
            });
            saveFavorites(favs);

            const frame = document.querySelector(`.maze-frame[data-seed="${seed}"]`);
            const heartBtn = frame ? frame.querySelector('.heart-btn') : null;
            if (heartBtn) heartBtn.classList.add('favorited');
            updateFavsTriggers();
        }

        function closePrintMode() {
            document.getElementById('printOverlay').classList.remove('open');
        }

        function printColor() {
            closeActionMenu();
            openPrintMode(false);
        }

        function printBW() {
            closeActionMenu();
            openPrintMode(true);
        }

        function getMazeFilename(cached) {
            const story = cached.maze.story || {};
            const character = story.character || 'maze';
            const goal = story.goal || 'finish';
            const level = cached.difficulty - 2;
            const clean = str => str.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
            return `${clean(character)}-to-${clean(goal)}-level-${level}.png`;
        }

        function saveToCameraRoll() {
            closeActionMenu();
            const cached = window.mazeCache[activeMazeId];
            if (!cached) return;

            autoFavorite(activeMazeId);

            const svgString = cached.maze.toSVG(false, false);
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            const scale = 4;
            canvas.width = 850 * scale;
            canvas.height = 1100 * scale;

            const img = new Image();
            const svgBlob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
            const url = URL.createObjectURL(svgBlob);

            img.onload = () => {
                ctx.fillStyle = '#fff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                const imgAspect = img.width / img.height;
                const canvasAspect = canvas.width / canvas.height;
                let drawW, drawH, drawX, drawY;

                if (imgAspect > canvasAspect) {
                    drawW = canvas.width * 0.9;
                    drawH = drawW / imgAspect;
                } else {
                    drawH = canvas.height * 0.9;
                    drawW = drawH * imgAspect;
                }
                drawX = (canvas.width - drawW) / 2;
                drawY = (canvas.height - drawH) / 2;

                ctx.drawImage(img, drawX, drawY, drawW, drawH);
                URL.revokeObjectURL(url);

                const filename = getMazeFilename(cached);

                canvas.toBlob(async blob => {
                    if (navigator.canShare && navigator.canShare({ files: [new File([blob], filename, { type: 'image/png' })] })) {
                        try {
                            await navigator.share({
                                files: [new File([blob], filename, { type: 'image/png' })]
                            });
                            return;
                        } catch (e) {
                            if (e.name === 'AbortError') return;
                        }
                    }
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = filename;
                    a.click();
                    URL.revokeObjectURL(a.href);
                }, 'image/png');
            };
            img.src = url;
        }

        function showSolution() {
            closeActionMenu();
            const cached = window.mazeCache[activeMazeId];
            if (!cached) return;

            document.getElementById('solutionDisplay').innerHTML = cached.maze.toSVG(true, false);
            document.getElementById('solutionOverlay').classList.add('open');
        }

        function closeSolution() {
            document.getElementById('solutionOverlay').classList.remove('open');
        }

        function navigateMaze(direction) {
            const container = document.getElementById('mazeContainer');
            const newIndex = currentIndex + direction;
            if (newIndex < 0) return;
            if (newIndex >= container.children.length) return;
            container.children[newIndex].scrollIntoView({ behavior: 'smooth' });
            updateNavArrows(newIndex);
        }

        function updateNavArrows(index) {
            const container = document.getElementById('mazeContainer');
            const upArrow = document.querySelector('.nav-arrow-up');
            const downArrow = document.querySelector('.nav-arrow-down');
            if (upArrow) upArrow.classList.toggle('hidden', index <= 0);
            if (downArrow) downArrow.classList.toggle('hidden', index >= container.children.length - 1);
        }

        function showDebugInfo() {
            closeActionMenu();
            const cached = window.mazeCache[activeMazeId];
            if (!cached) return;

            const debug = generateMazeDebugOutput(cached.maze);
            document.getElementById('debugContent').textContent = debug;
            document.getElementById('debugPanel').style.display = 'block';

            setTimeout(() => {
                document.addEventListener('click', () => {
                    document.getElementById('debugPanel').style.display = 'none';
                }, { once: true });
            }, 100);
        }

        // Close overlays on escape
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                closeActionMenu();
                closeSolution();
                closeFavorites();
            }
        });

        // Global function to refresh all mazes (called from debug.html via applyDebugSettings)
        window.refreshAllMazes = function() {
            const container = document.getElementById('mazeContainer');
            const frames = container.querySelectorAll('.maze-frame');

            frames.forEach((frame) => {
                const fadeContainer = frame.querySelector('.maze-fade-container');
                if (!fadeContainer) return;

                const seed = parseInt(fadeContainer.dataset.seed);
                const params = mazeParams.find(p => p.seed === seed);
                if (!params) return;

                // Re-generate maze with current settings
                const dims = findMazeDimensions(params.seed, currentDifficulty, params.shape, params.algorithm);
                const levelNum = currentDifficulty - 2;
                const gen = createMazeGenerator(params.seed);
                const newMaze = gen.generateWithStory(dims.w, dims.h, params.algorithm, params.shape, params.theme, false, levelNum);

                // Update cache
                window.mazeCache[params.seed] = { maze: newMaze, params, difficulty: currentDifficulty };

                // Update SVG in place (no animation for debug refresh)
                const svgContainer = fadeContainer.querySelector('.maze-svg-container');
                if (svgContainer) {
                    svgContainer.innerHTML = newMaze.toSVG(false, false);
                }
            });
        };
    </script>
</body>
</html>
