<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0f">
    <title>Print A Maze</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="apple-touch-icon" href="favicon.svg">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            height: 100%;
            overflow: hidden;
            font-family: 'Avenir Next', 'Avenir', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            touch-action: pan-y;
            transition: background-color 0.3s ease;
            -webkit-font-smoothing: antialiased;
        }
        /* Prevent text selection on all interactive elements */
        button, .difficulty-btn, .heart-btn, .favs-trigger, .fav-item, .action-btn, .share-pill, .level-dot, .level-indicator {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        /* Favorites section - pull down to reveal */
        #favoritesSection {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            transform: translateY(-100%);
            background: #1a1a1a;
            max-height: 60vh;
            overflow-y: auto;
            z-index: 50;
            padding: 20px;
            padding-top: max(20px, env(safe-area-inset-top));
            transition: transform 0.3s ease;
        }
        #favoritesSection.open { transform: translateY(0); }
        #favoritesSection h2 { color: #fff; font-size: 16px; margin-bottom: 15px; }
        .favs-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .favs-header h2 { margin-bottom: 0; }
        .favs-close-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }
        .favs-close-btn:active { background: rgba(255,255,255,0.2); }
        .fav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
        }
        .fav-item {
            aspect-ratio: 8.5/11;
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
        }
        .fav-item svg { width: 100%; height: 100%; }
        .no-favs {
            font-family: 'Avenir Next', 'Avenir', system-ui, sans-serif;
            color: #666;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.3px;
            text-align: center;
            padding: 30px;
        }

        /* Main maze container with snap scroll - fast and fluid */
        #mazeContainer {
            height: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: contain;
        }

        .maze-frame {
            height: 100vh;
            height: 100dvh;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            position: relative;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            overflow: hidden;
            /* Top margin 50% taller than before - add extra padding top */
            padding-top: calc(env(safe-area-inset-top) + 60px);
        }

        /* Fade container for difficulty transition animations */
        .maze-fade-container {
            position: relative;
            width: 100%;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            /* Prevent height bounce by using fixed background that extends */
            background: inherit;
        }

        .maze-svg-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            /* Fill any gaps with matching background */
            background: inherit;
        }

        .maze-svg-container.fade-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            opacity: 0;
            transition: opacity 0.2s ease-in-out;
            pointer-events: none;
        }

        .maze-svg-container.fade-overlay.fade-in {
            opacity: 1;
            pointer-events: auto;
        }

        .maze-svg-container svg {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
        }

        /* Bottom controls container - holds +/- buttons with dots between */
        .bottom-controls {
            position: relative;
            width: 100%;
            padding: 8px 0 max(12px, env(safe-area-inset-bottom));
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        /* Difficulty number above controls */
        .difficulty-number {
            font-family: 'Avenir Next', 'Avenir', system-ui, sans-serif;
            font-size: 13px;
            font-weight: 600;
            color: rgba(255,255,255,0.6);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* Difficulty row - buttons with dots between, all same Y center */
        .difficulty-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        /* Level indicator - between the buttons */
        .level-indicator {
            display: flex;
            gap: 5px;
            opacity: 0.5;
            position: relative;
            top: -18px;
        }
        .level-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: rgba(255,255,255,0.4);
            transition: background 0.2s, transform 0.2s;
        }
        .level-dot.active {
            background: rgba(255,255,255,0.9);
            transform: scale(1.4);
        }

        /* Difficulty +/- buttons */
        .difficulty-btn {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.25);
            background: rgba(0,0,0,0.3);
            color: rgba(255,255,255,0.6);
            font-size: 30px;
            font-weight: 300;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
            transition: opacity 0.2s, transform 0.1s, background 0.1s;
        }
        .difficulty-btn:active {
            transform: scale(0.92);
            background: rgba(255,255,255,0.15);
        }
        .difficulty-btn.hidden {
            visibility: hidden;
            pointer-events: none;
        }

        /* Heart favorite button - upper right */
        .heart-btn {
            position: absolute;
            top: max(12px, env(safe-area-inset-top));
            right: max(12px, env(safe-area-inset-right));
            width: 44px;
            height: 44px;
            background: none;
            border: none;
            font-size: 26px;
            cursor: pointer;
            opacity: 0.25;
            z-index: 10;
            -webkit-tap-highlight-color: transparent;
        }
        .heart-btn.favorited { opacity: 1; color: #e74c3c; }

        /* Favorites button - upper left with count */
        .favs-trigger {
            position: absolute;
            top: max(12px, env(safe-area-inset-top));
            left: max(12px, env(safe-area-inset-left));
            display: flex;
            align-items: center;
            gap: 6px;
            background: none;
            border: none;
            cursor: pointer;
            opacity: 0.4;
            z-index: 10;
            -webkit-tap-highlight-color: transparent;
            padding: 8px;
        }
        .favs-trigger:active { opacity: 0.7; }
        .favs-trigger .arrow {
            font-size: 20px;
            color: #fff;
        }
        .favs-trigger .count {
            font-family: 'Avenir Next', 'Avenir', system-ui, sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1.5px;
            color: rgb(255, 255, 255);
            text-transform: uppercase;
        }

        /* Action menu overlay */
        #actionMenu {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            -webkit-backdrop-filter: blur(8px);
            backdrop-filter: blur(8px);
        }
        #actionMenu.open { display: flex; }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 220px;
        }

        .action-btn {
            font-family: 'Avenir Next', 'Avenir', system-ui, sans-serif;
            padding: 14px 20px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            cursor: pointer;
            background: #fff;
            color: #333;
            font-weight: 500;
            letter-spacing: 0.3px;
            -webkit-tap-highlight-color: transparent;
        }
        .action-btn:active { background: #eee; }
        .action-btn.close-btn {
            background: transparent;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* Share pill button - split design */
        .share-pill {
            display: flex;
            border-radius: 12px;
            overflow: hidden;
            background: #fff;
            width: 100%;
        }
        .share-pill button {
            font-family: 'Avenir Next', 'Avenir', system-ui, sans-serif;
            padding: 14px 12px;
            border: none;
            background: #fff;
            color: #333;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 0.3px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            white-space: nowrap;
        }
        .share-pill button:first-child {
            flex: 0 0 35%;
            border-right: 1px solid #e0e0e0;
        }
        .share-pill button:last-child {
            flex: 1;
        }
        .share-pill button:active { background: #eee; }
        .share-pill .copied {
            background: #4CAF50;
            color: #fff;
        }

        /* Solution overlay */
        #solutionOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 150;
            padding: 20px;
        }
        #solutionOverlay.open { display: flex; }
        #solutionDisplay {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #solutionDisplay svg {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
        }
        #solutionOverlay .close-btn {
            position: absolute;
            top: max(15px, env(safe-area-inset-top));
            right: max(15px, env(safe-area-inset-right));
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 50%;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
        }

        /* Desktop navigation arrows - hidden on mobile/touch devices */
        .nav-arrow {
            display: none;
            position: fixed;
            left: 50%;
            transform: translateX(-50%);
            width: 48px;
            height: 32px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: rgba(255,255,255,0.6);
            font-size: 16px;
            cursor: pointer;
            z-index: 50;
            transition: background 0.2s, color 0.2s, opacity 0.2s;
        }
        .nav-arrow:hover {
            background: rgba(0,0,0,0.5);
            color: rgba(255,255,255,0.9);
        }
        .nav-arrow:active {
            background: rgba(255,255,255,0.2);
        }
        .nav-arrow-up {
            top: max(10px, env(safe-area-inset-top));
        }
        .nav-arrow-down {
            bottom: max(10px, env(safe-area-inset-bottom));
        }
        .nav-arrow.hidden {
            opacity: 0;
            pointer-events: none;
        }
        /* Show nav arrows only on non-touch devices with hover capability */
        @media (hover: hover) and (pointer: fine) {
            .nav-arrow {
                display: block;
            }
        }

        /* Debug panel */
        #debugPanel {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.9);
            color: #fff;
            padding: 15px;
            font-family: monospace;
            font-size: 11px;
            z-index: 200;
            max-height: 40vh;
            overflow-y: auto;
        }

        /* Print mode overlay */
        #printOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: #fff;
            z-index: 300;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        #printOverlay.open { display: flex; }
        #printOverlay .print-content {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.25in;
        }
        #printOverlay .print-content svg {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
        }
        #printOverlay .print-back-btn {
            position: absolute;
            top: max(20px, env(safe-area-inset-top));
            left: max(20px, env(safe-area-inset-left));
            height: 44px;
            padding: 0 16px;
            border-radius: 22px;
            border: 1.5px solid #333;
            background: #fff;
            color: #333;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 310;
        }
        #printOverlay .print-back-btn:active {
            background: #eee;
        }
        #printOverlay .print-back-btn .arrow {
            font-size: 18px;
        }

        /* Print styles - maximize page usage, single page on all devices */
        @media print {
            @page {
                size: letter;
                margin: 0;
            }
            html, body {
                width: 8.5in !important;
                height: 11in !important;
                max-height: 11in !important;
                margin: 0 !important;
                padding: 0 !important;
                background: #fff !important;
                overflow: hidden !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            body * {
                visibility: hidden;
            }
            #printOverlay, #printOverlay * {
                visibility: visible;
            }
            #printOverlay {
                position: fixed !important;
                left: 0 !important;
                top: 0 !important;
                width: 8.5in !important;
                height: 11in !important;
                max-height: 11in !important;
                overflow: hidden !important;
                background: #fff !important;
                display: flex !important;
                align-items: center !important;
                justify-content: center !important;
            }
            #printOverlay .print-back-btn {
                display: none !important;
            }
            #printOverlay .print-content {
                width: 8in !important;
                height: 10.5in !important;
                max-width: 8in !important;
                max-height: 10.5in !important;
                padding: 0 !important;
                margin: 0.25in !important;
                display: flex !important;
                align-items: center !important;
                justify-content: center !important;
                overflow: hidden !important;
            }
            #printOverlay .print-content svg {
                width: auto !important;
                height: auto !important;
                max-width: 100% !important;
                max-height: 100% !important;
                object-fit: contain !important;
            }
        }

    </style>
</head>
<body>
    <!-- Favorites - pull down to reveal -->
    <div id="favoritesSection">
        <div class="favs-header">
            <h2>Saved Mazes</h2>
            <button class="favs-close-btn" onclick="closeFavorites()">✕</button>
        </div>
        <div id="favGrid" class="fav-grid"></div>
        <div id="noFavs" class="no-favs">No saved mazes yet. Tap the heart to save one!</div>
    </div>

    <!-- Main scrolling maze container -->
    <div id="mazeContainer"></div>

    <!-- Desktop navigation arrows (hidden on mobile) -->
    <button class="nav-arrow nav-arrow-up" onclick="navigateMaze(-1)" title="Previous maze">▲</button>
    <button class="nav-arrow nav-arrow-down" onclick="navigateMaze(1)" title="Next maze">▼</button>

    <!-- Action menu - click outside buttons to dismiss -->
    <div id="actionMenu" onclick="closeActionMenu()">
        <div class="action-buttons" onclick="event.stopPropagation()">
            <button class="action-btn" id="menuHeartBtn" onclick="toggleFavoriteFromMenu()">♥ Save to Favorites</button>
            <div class="share-pill">
                <button onclick="shareMaze()">↗ Share</button>
                <button id="copyLinkBtn" onclick="copyMazeLink()">🔗 Copy Link</button>
            </div>
            <button class="action-btn" onclick="printColor()">🖨️ Print Color</button>
            <button class="action-btn" onclick="printBW()">📄 Print B&W</button>
            <button class="action-btn" onclick="saveToCameraRoll()">📷 Save to Photos</button>
            <button class="action-btn" onclick="showSolution()">🔍 Show Solution</button>
            <button class="action-btn" id="debugBtn" style="display:none" onclick="showDebugInfo()">🔧 Debug Info</button>
        </div>
    </div>

    <!-- Solution overlay -->
    <div id="solutionOverlay">
        <button class="close-btn" onclick="closeSolution()">✕</button>
        <div id="solutionDisplay"></div>
    </div>

    <!-- Debug panel -->
    <div id="debugPanel">
        <strong>Debug Info</strong>
        <pre id="debugContent"></pre>
    </div>

    <!-- Print overlay (same page, no new tab) -->
    <div id="printOverlay">
        <button class="print-back-btn" onclick="closePrintMode()">
            <span class="arrow">←</span>
            <span>back to printamaze.com</span>
        </button>
        <div class="print-content" id="printContent"></div>
    </div>
    <script>
/**
 * MazeJS - Client-Side Maze Generator with Themes & Shapes
 * Deterministic generation with seeded random
 */

// =============================================================================
// DEBUG SETTINGS - Configurable via debug.html panel
// =============================================================================

const DebugSettings = {
    showBounds: false,
    titleSize: 33,
    titleYOffset: -31,
    titleStroke: 4.2,
    titleOutline: 10,
    titleLetterSpacing: 1.6,
    questSize: 24,
    questYOffset: 2,
    questStroke: 3,
    questOutline: 6,
    questLineSpacing: 35,
    questLetterSpacing: 1.75,
    // START/END labels - all values relative to room dimensions
    startXOffsetPct: 0,        // X offset as % of room width (0 = centered)
    startYOffsetPct: -0.27,    // Y offset as % of room height from bottom (negative = up into room)
    startSizePct: 0.13,        // Text height as % of room width
    startStrokePct: 0.019,     // Stroke as % of room width
    startStrokeMin: 1.5,       // Minimum stroke width in pixels
    startLetterSpacing: 1.75,  // Letter spacing multiplier for START
    endXOffsetPct: 0.01,       // X offset as % of room width (0 = centered)
    endYOffsetPct: -0.3,       // Y offset as % of room height from bottom
    endSizePct: 0.15,          // Text height as % of room width (END is shorter word)
    endStrokePct: 0.027,       // Stroke as % of room width
    endStrokeMin: 0.8,         // Minimum stroke width in pixels
    endLetterSpacing: 1.65,    // Letter spacing multiplier for END
    // Character art - all values relative to room dimensions (center-anchored)
    charXOffsetPct: 0,         // X offset as % of room width (0 = centered)
    charYOffsetPct: -0.14,     // Y offset as % of room height (0 = centered)
    charSizePct: 0.56,         // Art size as % of room width
    charStrokePct: 0.024,      // Stroke as % of room width
    charStrokeMin: 1.3,        // Minimum stroke width in pixels
    // Goal art - all values relative to room dimensions (center-anchored)
    goalXOffsetPct: 0,         // X offset as % of room width (0 = centered)
    goalYOffsetPct: -0.08,     // Y offset as % of room height (0 = centered)
    goalSizePct: 0.71,         // Art size as % of room width
    goalStrokePct: 0.02,       // Stroke as % of room width
    goalStrokeMin: 1.8,        // Minimum stroke width in pixels
    titleAreaHeight: 70,
    questAreaHeight: 120,
    sideMargin: 55,
    topMargin: 15,
    bottomMargin: 15,
    decorScale: 1,
    // Minimum size in inches for each decoration type (page width = 8.5")
    // Set to 0 to always show, higher values filter out small decorations
    minCornerDecorInches: 0,   // Corner/mask area decorations
    minRoomDecorInches: 0,     // Interior room decorations (multi-cell rooms)
    minScatterDecorInches: 0.34, // Scattered decorations in paths/dead ends
    // Corner decorations (outside mask area) - stroke as % of decoration size
    cornerDecorStrokePct: 0.03,
    cornerDecorStrokeMin: 0.5,
    // Room decorations (interior rooms) - stroke as % of decoration size
    roomDecorStrokePct: 0.03,
    roomDecorStrokeMin: 0.5,
    // Scattered decorations (paths/dead ends) - stroke as % of decoration size
    scatterDecorStrokePct: 0.04,
    scatterDecorStrokeMin: 0.4,
    // Custom art rooms - carve room shape to match art pixel occupancy
    useCustomArtRooms: true,      // Enable custom-shaped rooms based on art
    showArtOccupiedCells: false,  // Show which cells art occupies in debug mode
    artOccupancyThreshold: 30,    // Alpha threshold (0-255) for pixel occupancy
    // Adaptive artwork in unused page / shape space
    useMarginArtwork: true,       // Fill page margins and maze whitespace with themed artwork
    useNegativeSpaceArtwork: true,// Fill blocked cells outside non-rectangular maze shapes
    marginArtHeroCount: 2,        // Max large artwork pieces in unused margin regions
    marginArtPatternDensity: 0.58,// 0-1: density for repeated small motifs
    marginArtOpacity: 0.24,       // Screen opacity for ambient artwork
    marginArtPrintOpacity: 0.16,  // Print opacity for ambient artwork
    marginArtMinHeroInches: 0.55, // Minimum hero-art size in page inches
    marginArtMinPatternInches: 0.14 // Minimum repeated motif size in page inches
};

// Global function to apply debug settings from parent debug.html
if (typeof window !== 'undefined') {
    window.applyDebugSettings = function(settings) {
        Object.assign(DebugSettings, settings);
        // Trigger re-render of all visible mazes
        if (window.refreshAllMazes) {
            window.refreshAllMazes();
        }
    };
}

// =============================================================================
// ART MASK GENERATOR - Determines which cells art occupies
// Renders SVG art to canvas and checks pixel alpha to find occupied cells
// =============================================================================

const ArtMaskGenerator = {
    // Cache for computed masks: Map<artName, Map<gridSize, Set<"dx,dy">>>
    cache: new Map(),

    /**
     * Get the cells occupied by an art piece at a given grid size
     * @param {string} artName - Name of the art (e.g., 'explorer', 'treasure')
     * @param {Function} artGenerator - The art generator function (CharacterArt[name] or GoalArt[name])
     * @param {number} artSize - Size of the art in pixels
     * @param {number} cellSize - Size of each grid cell in pixels
     * @param {number} threshold - Alpha threshold (0-255) to consider a pixel "occupied"
     * @returns {Array<{dx: number, dy: number}>} Array of cell offsets from art center
     */
    getOccupiedCells(artName, artGenerator, artSize, cellSize, threshold = 30) {
        // Create cache key
        const cacheKey = `${artName}_${artSize}_${cellSize}`;
        if (this.cache.has(cacheKey)) {
            return this.cache.get(cacheKey);
        }

        // Calculate grid dimensions (how many cells the art spans)
        const gridCells = Math.ceil(artSize / cellSize) + 2; // +2 for padding
        const canvasSize = gridCells * cellSize;
        const centerX = canvasSize / 2;
        const centerY = canvasSize / 2;

        // Create offscreen canvas
        const canvas = document.createElement('canvas');
        canvas.width = canvasSize;
        canvas.height = canvasSize;
        const ctx = canvas.getContext('2d');

        // Generate SVG for the art centered in the canvas
        const svgContent = artGenerator(centerX, centerY, artSize);
        const svgWrapper = `<svg xmlns="http://www.w3.org/2000/svg" width="${canvasSize}" height="${canvasSize}">
            <g style="color:#000; stroke:#000; fill:#000">${svgContent}</g>
        </svg>`;

        // Create image from SVG
        const img = new Image();
        const blob = new Blob([svgWrapper], { type: 'image/svg+xml' });
        const url = URL.createObjectURL(blob);

        // Return a promise that resolves with occupied cells
        return new Promise((resolve) => {
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
                URL.revokeObjectURL(url);

                const occupiedCells = [];
                const halfGrid = Math.floor(gridCells / 2);

                // Check each cell for non-transparent pixels
                for (let gy = 0; gy < gridCells; gy++) {
                    for (let gx = 0; gx < gridCells; gx++) {
                        const cellX = gx * cellSize;
                        const cellY = gy * cellSize;

                        // Sample multiple points in the cell for accuracy
                        let hasContent = false;
                        const samples = 5; // 5x5 grid of samples per cell
                        for (let sy = 0; sy < samples && !hasContent; sy++) {
                            for (let sx = 0; sx < samples && !hasContent; sx++) {
                                const px = cellX + (sx + 0.5) * (cellSize / samples);
                                const py = cellY + (sy + 0.5) * (cellSize / samples);
                                const pixel = ctx.getImageData(Math.floor(px), Math.floor(py), 1, 1).data;
                                // Check if pixel has any visible content (alpha > threshold)
                                if (pixel[3] > threshold) {
                                    hasContent = true;
                                }
                            }
                        }

                        if (hasContent) {
                            // Store as offset from center cell
                            const dx = gx - halfGrid;
                            const dy = gy - halfGrid;
                            occupiedCells.push({ dx, dy });
                        }
                    }
                }

                // Cache the result
                this.cache.set(cacheKey, occupiedCells);
                resolve(occupiedCells);
            };

            img.onerror = () => {
                URL.revokeObjectURL(url);
                // Fallback to square room on error
                const fallback = [];
                const halfSize = Math.ceil(artSize / cellSize / 2);
                for (let dy = -halfSize; dy <= halfSize; dy++) {
                    for (let dx = -halfSize; dx <= halfSize; dx++) {
                        fallback.push({ dx, dy });
                    }
                }
                resolve(fallback);
            };

            img.src = url;
        });
    },

    /**
     * Synchronous version using precomputed masks
     * For art that has been pre-analyzed, returns cached cells immediately
     */
    getOccupiedCellsSync(artName, artSize, cellSize) {
        const cacheKey = `${artName}_${artSize}_${cellSize}`;
        if (this.cache.has(cacheKey)) {
            return this.cache.get(cacheKey);
        }
        // Return null if not cached - caller should use async version or fallback
        return null;
    },

    /**
     * Precompute masks for all art at common sizes
     * Call this during initialization
     */
    async precomputeAll(characterArt, goalArt, cellSizes = [8, 10, 12, 15, 18, 20]) {
        const artSizes = [30, 40, 50, 60, 80, 100, 120];
        const promises = [];

        for (const [name, generator] of Object.entries(characterArt)) {
            for (const cellSize of cellSizes) {
                for (const artSize of artSizes) {
                    promises.push(this.getOccupiedCells(name, generator, artSize, cellSize));
                }
            }
        }

        for (const [name, generator] of Object.entries(goalArt)) {
            for (const cellSize of cellSizes) {
                for (const artSize of artSizes) {
                    promises.push(this.getOccupiedCells(name, generator, artSize, cellSize));
                }
            }
        }

        await Promise.all(promises);
        console.log(`ArtMaskGenerator: Precomputed ${this.cache.size} masks`);
    },

    /**
     * Clear the cache
     */
    clearCache() {
        this.cache.clear();
    },

    /**
     * Get a simple square fallback mask
     */
    getSquareMask(roomSize) {
        const cells = [];
        for (let dy = 0; dy < roomSize; dy++) {
            for (let dx = 0; dx < roomSize; dx++) {
                cells.push({ dx, dy });
            }
        }
        return cells;
    },

    /**
     * Convert occupied cells to absolute grid positions
     * @param {Array<{dx, dy}>} occupiedCells - Relative cell offsets
     * @param {number} centerX - Center X in grid coordinates
     * @param {number} centerY - Center Y in grid coordinates
     * @returns {Array<{x, y}>} Absolute grid positions
     */
    toAbsolutePositions(occupiedCells, centerX, centerY) {
        return occupiedCells.map(({ dx, dy }) => ({
            x: centerX + dx,
            y: centerY + dy
        }));
    },

    /**
     * Check if a custom room shape can be placed at a position
     * @param {Array<{x, y}>} cells - Absolute cell positions
     * @param {Object} maze - The maze object with cells array
     * @param {number} minGap - Minimum gap from other rooms
     * @returns {boolean} True if placement is valid
     */
    canPlaceCustomRoom(cells, maze, minGap = 1) {
        for (const { x, y } of cells) {
            // Check bounds
            if (x < minGap || x >= maze.width - minGap ||
                y < minGap || y >= maze.height - minGap) {
                return false;
            }
            // Check if cell is blocked (outside mask shape)
            if (maze.cells[y] && maze.cells[y][x] && maze.cells[y][x].blocked) {
                return false;
            }
            // Check gap around the cell
            for (let dy = -minGap; dy <= minGap; dy++) {
                for (let dx = -minGap; dx <= minGap; dx++) {
                    const nx = x + dx;
                    const ny = y + dy;
                    if (nx >= 0 && nx < maze.width && ny >= 0 && ny < maze.height) {
                        const cell = maze.cells[ny][nx];
                        // Check if this cell is part of another room
                        if (cell.isRoom && !cells.some(c => c.x === nx && c.y === ny)) {
                            return false;
                        }
                    }
                }
            }
        }
        return true;
    },

    /**
     * Get an approximate room shape for synchronous maze generation
     * Uses cached mask if available, otherwise returns a circular approximation
     * @param {string} artName - Name of the art
     * @param {number} artSize - Size of art in pixels
     * @param {number} cellSize - Size of each cell in pixels
     * @param {number} centerX - Center X in grid coordinates
     * @param {number} centerY - Center Y in grid coordinates
     * @returns {Array<{x, y}>} Array of absolute cell positions
     */
    getApproximateRoomCells(artName, artSize, cellSize, centerX, centerY) {
        // Check cache first
        const cacheKey = `${artName}_${Math.round(artSize)}_${Math.round(cellSize)}`;
        const cached = this.cache.get(cacheKey);
        if (cached) {
            return this.toAbsolutePositions(cached, centerX, centerY);
        }

        // Fallback: circular approximation
        // Most art is roughly circular, so use radius = artSize / (2 * cellSize)
        const cells = [];
        const radius = artSize / (2 * cellSize);
        const radiusCells = Math.ceil(radius);

        for (let dy = -radiusCells; dy <= radiusCells; dy++) {
            for (let dx = -radiusCells; dx <= radiusCells; dx++) {
                // Check if cell center is within the circular region
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist <= radius + 0.5) {  // +0.5 for cell center tolerance
                    cells.push({ x: centerX + dx, y: centerY + dy });
                }
            }
        }

        return cells;
    },

    /**
     * Get a rectangular room approximation
     * Simpler than circular, used as fallback
     */
    getRectangularRoomCells(artSize, cellSize, centerX, centerY) {
        const cells = [];
        const halfSize = Math.ceil(artSize / (2 * cellSize));

        for (let dy = -halfSize; dy <= halfSize; dy++) {
            for (let dx = -halfSize; dx <= halfSize; dx++) {
                cells.push({ x: centerX + dx, y: centerY + dy });
            }
        }

        return cells;
    }
};

    // Render text as SVG path
    renderText(text, x, y, height, color = '#000', strokeWidth = 1.0, letterSpacing = 1.0) {
        const scale = height / this.charHeight;
        const charW = this.charWidth * scale;
        const spacing = charW * 0.2 * letterSpacing;
        let paths = [];
        let curX = x;

        for (const char of text.toUpperCase()) {
            const glyph = this.glyphs[char];
            if (glyph) {
                for (const stroke of glyph) {
                    if (stroke.length > 0) {
                        const d = stroke.map((pt, i) =>
                            `${i === 0 ? 'M' : 'L'}${curX + pt[0] * scale},${y + pt[1] * scale}`
                        ).join(' ');
                        paths.push(d);
                    }
                }
            }
            curX += charW + spacing;
        }

        if (paths.length === 0) return '';
        return `<path d="${paths.join(' ')}" fill="none" stroke="${color}" stroke-width="${strokeWidth}" stroke-linecap="round" stroke-linejoin="round"/>`;
    },

    // Measure text width
    measureText(text, height, letterSpacing = 1.0) {
        const scale = height / this.charHeight;
        const charW = this.charWidth * scale;
        const spacing = charW * 0.2 * letterSpacing;
        return text.length * (charW + spacing) - spacing;
    },

    // Render text centered at position
    renderCentered(text, centerX, y, height, color = '#000', strokeWidth = 1.0, letterSpacing = 1.0) {
        const width = this.measureText(text, height, letterSpacing);
        return this.renderText(text, centerX - width / 2, y, height, color, strokeWidth, letterSpacing);
    }
};

// Seeded Random Number Generator (Mulberry32)
class SeededRandom {
    constructor(seed) {
        this.seed = seed;
    }

    next() {
        let t = this.seed += 0x6D2B79F5;
        t = Math.imul(t ^ t >>> 15, t | 1);
        t ^= t + Math.imul(t ^ t >>> 7, t | 61);
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
    }

    nextInt(min, max) {
        return Math.floor(this.next() * (max - min + 1)) + min;
    }

    shuffle(array) {
        const arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(this.next() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    choice(array) {
        return array[Math.floor(this.next() * array.length)];
    }
}

// Expose immediately for index.html. Top-level `class` declarations are not
// reliable `window.*` properties in every classic-script/cached-build path.
if (typeof globalThis !== 'undefined') {
    globalThis.SeededRandom = SeededRandom;
}
if (typeof window !== 'undefined') {
    window.SeededRandom = SeededRandom;
}

// Shape Masks
const ShapeMasks = {
    rectangle: (x, y, w, h) => true,

    circle: (x, y, w, h) => {
        const cx = (w - 1) / 2;
        const cy = (h - 1) / 2;
        const rx = w / 2;
        const ry = h / 2;
        const dx = (x - cx) / rx;
        const dy = (y - cy) / ry;
        return dx * dx + dy * dy <= 1;
    },

    heart: (x, y, w, h) => {
        const nx = (x / (w - 1)) * 2 - 1;
        const ny = 1 - (y / (h - 1)) * 2;
        const v = nx * nx + Math.pow(ny - Math.sqrt(Math.abs(nx)), 2);
        return v <= 1;
    },

    star: (x, y, w, h) => {
        const cx = (w - 1) / 2;
        const cy = (h - 1) / 2;
        const dx = x - cx;
        const dy = y - cy;
        const angle = Math.atan2(dy, dx);
        const dist = Math.sqrt(dx * dx + dy * dy);
        const maxR = Math.min(cx, cy);
        const points = 5;
        const innerR = maxR * 0.4;
        const outerR = maxR;
        const a = ((angle + Math.PI * 2) % (Math.PI * 2 / points)) / (Math.PI / points);
        const r = a < 1 ? innerR + (outerR - innerR) * (1 - a) : innerR + (outerR - innerR) * (a - 1);
        return dist <= r;
    },

    hexagon: (x, y, w, h) => {
        const cx = (w - 1) / 2;
        const cy = (h - 1) / 2;
        const dx = Math.abs(x - cx) / cx;
        const dy = Math.abs(y - cy) / cy;
        return dx <= 1 && dy <= 1 && dx + dy * 0.5 <= 1;
    },

    diamond: (x, y, w, h) => {
        const cx = (w - 1) / 2;
        const cy = (h - 1) / 2;
        const dx = Math.abs(x - cx) / cx;
        const dy = Math.abs(y - cy) / cy;
        return dx + dy <= 1;
    },

    // Triangle pointing up
    triangle: (x, y, w, h) => {
        const nx = x / (w - 1);
        const ny = y / (h - 1);
        const halfWidth = 0.5 * (1 - ny);
        return nx >= 0.5 - halfWidth && nx <= 0.5 + halfWidth;
    },

    // Oval (taller ellipse)
    oval: (x, y, w, h) => {
        const cx = (w - 1) / 2;
        const cy = (h - 1) / 2;
        const rx = w / 2.5;
        const ry = h / 2;
        const dx = (x - cx) / rx;
        const dy = (y - cy) / ry;
        return dx * dx + dy * dy <= 1;
    },

    // Cross/Plus shape
    cross: (x, y, w, h) => {
        const nx = Math.abs(x - (w - 1) / 2) / ((w - 1) / 2);
        const ny = Math.abs(y - (h - 1) / 2) / ((h - 1) / 2);
        return nx <= 0.35 || ny <= 0.35;
    },

    // Arrow pointing up
    arrow: (x, y, w, h) => {
        const nx = x / (w - 1);
        const ny = y / (h - 1);
        // Arrow head (top portion)
        if (ny <= 0.5) {
            const halfWidth = 0.5 * (1 - ny * 2);
            return nx >= 0.5 - halfWidth && nx <= 0.5 + halfWidth;
        }
        // Arrow shaft
        return nx >= 0.35 && nx <= 0.65;
    },

    // Crescent moon
    moon: (x, y, w, h) => {
        const cx = (w - 1) / 2;
        const cy = (h - 1) / 2;
        const r = Math.min(w, h) / 2;
        const dx1 = x - cx;
        const dy1 = y - cy;
        const dist1 = Math.sqrt(dx1 * dx1 + dy1 * dy1);
        const dx2 = x - (cx + r * 0.4);
        const dy2 = y - cy;
        const dist2 = Math.sqrt(dx2 * dx2 + dy2 * dy2);
        return dist1 <= r && dist2 > r * 0.85;
    },

    // Cloud shape
    cloud: (x, y, w, h) => {
        const nx = x / (w - 1);
        const ny = y / (h - 1);
        // Multiple overlapping circles
        const c1 = Math.pow(nx - 0.3, 2) + Math.pow(ny - 0.6, 2) <= 0.08;
        const c2 = Math.pow(nx - 0.5, 2) + Math.pow(ny - 0.5, 2) <= 0.1;
        const c3 = Math.pow(nx - 0.7, 2) + Math.pow(ny - 0.6, 2) <= 0.08;
        const c4 = Math.pow(nx - 0.4, 2) + Math.pow(ny - 0.65, 2) <= 0.06;
        const c5 = Math.pow(nx - 0.6, 2) + Math.pow(ny - 0.65, 2) <= 0.06;
        return c1 || c2 || c3 || c4 || c5;
    },

    // Christmas tree
    tree: (x, y, w, h) => {
        const nx = x / (w - 1);
        const ny = y / (h - 1);
        // Trunk
        if (ny > 0.85) return nx >= 0.4 && nx <= 0.6;
        // Tree layers (3 triangles)
        const layer1 = ny <= 0.35 && nx >= 0.5 - (0.35 - ny) * 0.8 && nx <= 0.5 + (0.35 - ny) * 0.8;
        const layer2 = ny > 0.25 && ny <= 0.6 && nx >= 0.5 - (0.6 - ny) * 0.7 && nx <= 0.5 + (0.6 - ny) * 0.7;
        const layer3 = ny > 0.5 && ny <= 0.85 && nx >= 0.5 - (0.85 - ny) * 0.6 && nx <= 0.5 + (0.85 - ny) * 0.6;
        return layer1 || layer2 || layer3;
    },

    // House shape
    house: (x, y, w, h) => {
        const nx = x / (w - 1);
        const ny = y / (h - 1);
        // Roof (triangle)
        if (ny <= 0.4) {
            const halfWidth = 0.5 * (ny / 0.4);
            return nx >= 0.5 - halfWidth && nx <= 0.5 + halfWidth;
        }
        // Walls
        return nx >= 0.15 && nx <= 0.85;
    },

    // Cat face
    cat: (x, y, w, h) => {
        const cx = (w - 1) / 2;
        const cy = (h - 1) / 2;
        const r = Math.min(w, h) / 2.2;
        const dx = x - cx;
        const dy = y - cy;
        // Main face (circle)
        const face = dx * dx + dy * dy <= r * r;
        // Left ear
        const nx = x / (w - 1);
        const ny = y / (h - 1);
        const leftEar = ny < 0.3 && nx < 0.35 && nx > 0.1 && ny > nx - 0.1;
        const rightEar = ny < 0.3 && nx > 0.65 && nx < 0.9 && ny > (1 - nx) - 0.1;
        return face || leftEar || rightEar;
    },

    // Bunny
    bunny: (x, y, w, h) => {
        const nx = x / (w - 1);
        const ny = y / (h - 1);
        // Head (oval)
        const head = Math.pow((nx - 0.5) / 0.35, 2) + Math.pow((ny - 0.65) / 0.3, 2) <= 1;
        // Left ear
        const leftEar = Math.pow((nx - 0.35) / 0.1, 2) + Math.pow((ny - 0.25) / 0.25, 2) <= 1;
        // Right ear
        const rightEar = Math.pow((nx - 0.65) / 0.1, 2) + Math.pow((ny - 0.25) / 0.25, 2) <= 1;
        return head || leftEar || rightEar;
    },

    // Rocket
    rocket: (x, y, w, h) => {
        const nx = x / (w - 1);
        const ny = y / (h - 1);
        // Nose cone
        if (ny <= 0.2) {
            const halfWidth = 0.15 * (ny / 0.2);
            return nx >= 0.5 - halfWidth && nx <= 0.5 + halfWidth;
        }
        // Body
        if (ny <= 0.75) return nx >= 0.35 && nx <= 0.65;
        // Fins
        const leftFin = nx >= 0.15 && nx <= 0.35 && ny >= 0.75;
        const rightFin = nx >= 0.65 && nx <= 0.85 && ny >= 0.75;
        const body = nx >= 0.35 && nx <= 0.65;
        return leftFin || rightFin || body;
    },

    // Fish
    fish: (x, y, w, h) => {
        const nx = x / (w - 1);
        const ny = y / (h - 1);
        // Body (ellipse)
        const body = Math.pow((nx - 0.4) / 0.35, 2) + Math.pow((ny - 0.5) / 0.3, 2) <= 1;
        // Tail
        const tail = nx >= 0.7 && Math.abs(ny - 0.5) <= (nx - 0.7) * 1.5;
        return body || tail;
    },

    // Butterfly
    butterfly: (x, y, w, h) => {
        const nx = x / (w - 1);
        const ny = y / (h - 1);
        // Upper left wing
        const ul = Math.pow((nx - 0.25) / 0.25, 2) + Math.pow((ny - 0.35) / 0.3, 2) <= 1;
        // Upper right wing
        const ur = Math.pow((nx - 0.75) / 0.25, 2) + Math.pow((ny - 0.35) / 0.3, 2) <= 1;
        // Lower left wing
        const ll = Math.pow((nx - 0.3) / 0.2, 2) + Math.pow((ny - 0.7) / 0.2, 2) <= 1;
        // Lower right wing
        const lr = Math.pow((nx - 0.7) / 0.2, 2) + Math.pow((ny - 0.7) / 0.2, 2) <= 1;
        // Body
        const body = nx >= 0.45 && nx <= 0.55;
        return ul || ur || ll || lr || body;
    },

    // Castle
    castle: (x, y, w, h) => {
        const nx = x / (w - 1);
        const ny = y / (h - 1);
        // Towers (top)
        const tower1 = nx >= 0.05 && nx <= 0.2 && ny <= 0.5;
        const tower2 = nx >= 0.4 && nx <= 0.6 && ny <= 0.35;
        const tower3 = nx >= 0.8 && nx <= 0.95 && ny <= 0.5;
        // Main wall
        const wall = ny >= 0.35 && ny <= 0.9 && nx >= 0.1 && nx <= 0.9;
        // Battlements
        const batt = ny <= 0.4 && ny >= 0.35 && ((nx >= 0.15 && nx <= 0.25) || (nx >= 0.35 && nx <= 0.45) || (nx >= 0.55 && nx <= 0.65) || (nx >= 0.75 && nx <= 0.85));
        return tower1 || tower2 || tower3 || wall || batt;
    },

    // Crown
    crown: (x, y, w, h) => {
        const nx = x / (w - 1);
        const ny = y / (h - 1);
        // Base
        if (ny >= 0.7) return nx >= 0.15 && nx <= 0.85;
        // Points
        if (ny >= 0.3) {
            // 5 points
            const seg = (nx - 0.15) / 0.7;
            const point = seg * 5;
            const pointIdx = Math.floor(point);
            const pointPos = point - pointIdx;
            if (pointIdx % 2 === 0) {
                // Going up
                return ny >= 0.7 - pointPos * 0.4;
            } else {
                // Going down
                return ny >= 0.3 + pointPos * 0.4;
            }
        }
        return false;
    },

    // Lightning bolt
    lightning: (x, y, w, h) => {
        const nx = x / (w - 1);
        const ny = y / (h - 1);
        // Top diagonal
        if (ny <= 0.45) {
            const target = 0.3 + ny * 0.6;
            return nx >= target - 0.15 && nx <= target + 0.1;
        }
        // Middle
        if (ny <= 0.55) {
            return nx >= 0.35 && nx <= 0.75;
        }
        // Bottom diagonal
        const target = 0.7 - (ny - 0.55) * 0.8;
        return nx >= target - 0.1 && nx <= target + 0.15;
    },

    // Mushroom
    mushroom: (x, y, w, h) => {
        const nx = x / (w - 1);
        const ny = y / (h - 1);
        // Cap (half circle)
        if (ny <= 0.5) {
            return Math.pow((nx - 0.5) / 0.45, 2) + Math.pow((ny - 0.5) / 0.45, 2) <= 1 && ny <= 0.5;
        }
        // Stem
        return nx >= 0.35 && nx <= 0.65;
    },

    // Ghost
    ghost: (x, y, w, h) => {
        const nx = x / (w - 1);
        const ny = y / (h - 1);
        // Head (half circle)
        if (ny <= 0.5) {
            return Math.pow((nx - 0.5) / 0.35, 2) + Math.pow((ny - 0.5) / 0.4, 2) <= 1;
        }
        // Body with wavy bottom
        if (ny <= 0.9) {
            return nx >= 0.15 && nx <= 0.85;
        }
        // Wavy bottom
        const wave = Math.sin(nx * Math.PI * 4) * 0.05;
        return nx >= 0.15 && nx <= 0.85 && ny <= 0.95 + wave;
    },

    // Pumpkin
    pumpkin: (x, y, w, h) => {
        const nx = x / (w - 1);
        const ny = y / (h - 1);
        // Stem
        if (ny <= 0.15) {
            return nx >= 0.45 && nx <= 0.55;
        }
        // Main body (slightly squashed circle with segments)
        const body = Math.pow((nx - 0.5) / 0.45, 2) + Math.pow((ny - 0.55) / 0.4, 2) <= 1;
        return body;
    },

    // Egg
    egg: (x, y, w, h) => {
        const nx = x / (w - 1);
        const ny = y / (h - 1);
        // Modified ellipse (wider at bottom)
        const widthFactor = 0.3 + ny * 0.15;
        return Math.pow((nx - 0.5) / widthFactor, 2) + Math.pow((ny - 0.5) / 0.45, 2) <= 1;
    },

    // Apple
    apple: (x, y, w, h) => {
        const nx = x / (w - 1);
        const ny = y / (h - 1);
        // Stem
        if (ny <= 0.15 && nx >= 0.45 && nx <= 0.55) return true;
        // Leaf
        if (ny <= 0.25 && ny >= 0.1 && nx >= 0.55 && nx <= 0.7) return true;
        // Body (heart-ish shape inverted)
        const body = Math.pow((nx - 0.5) / 0.4, 2) + Math.pow((ny - 0.55) / 0.4, 2) <= 1;
        // Indent at top
        const indent = ny <= 0.35 && Math.pow((nx - 0.5) / 0.15, 2) + Math.pow((ny - 0.2) / 0.15, 2) <= 1;
        return body && !indent;
    },

    // Flower
    flower: (x, y, w, h) => {
        const cx = (w - 1) / 2;
        const cy = (h - 1) / 2;
        const dx = x - cx;
        const dy = y - cy;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const maxR = Math.min(cx, cy);
        // Center
        if (dist <= maxR * 0.25) return true;
        // Petals (5)
        const angle = Math.atan2(dy, dx);
        const petalAngle = ((angle + Math.PI * 2) % (Math.PI * 2 / 5)) - Math.PI / 5;
        const petalDist = Math.abs(petalAngle) / (Math.PI / 5);
        const r = maxR * 0.25 + (1 - petalDist) * maxR * 0.6;
        return dist <= r;
    },

    // Clover (4 leaf)
    clover: (x, y, w, h) => {
        const nx = x / (w - 1);
        const ny = y / (h - 1);
        // Four leaves
        const tl = Math.pow((nx - 0.35) / 0.2, 2) + Math.pow((ny - 0.35) / 0.2, 2) <= 1;
        const tr = Math.pow((nx - 0.65) / 0.2, 2) + Math.pow((ny - 0.35) / 0.2, 2) <= 1;
        const bl = Math.pow((nx - 0.35) / 0.2, 2) + Math.pow((ny - 0.65) / 0.2, 2) <= 1;
        const br = Math.pow((nx - 0.65) / 0.2, 2) + Math.pow((ny - 0.65) / 0.2, 2) <= 1;
        // Stem
        const stem = nx >= 0.47 && nx <= 0.53 && ny >= 0.7;
        return tl || tr || bl || br || stem;
    },

    // Pac-Man
    pacman: (x, y, w, h) => {
        const cx = (w - 1) / 2;
        const cy = (h - 1) / 2;
        const dx = x - cx;
        const dy = y - cy;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const r = Math.min(cx, cy);
        const angle = Math.atan2(dy, dx);
        // Circle minus mouth wedge
        const mouth = angle > -Math.PI / 4 && angle < Math.PI / 4;
        return dist <= r && !mouth;
    },

    // Skull
    skull: (x, y, w, h) => {
        const nx = x / (w - 1);
        const ny = y / (h - 1);
        // Top of skull (circle)
        const top = ny <= 0.6 && Math.pow((nx - 0.5) / 0.4, 2) + Math.pow((ny - 0.4) / 0.35, 2) <= 1;
        // Jaw
        const jaw = ny >= 0.55 && ny <= 0.85 && nx >= 0.25 && nx <= 0.75;
        // Eye holes (subtract)
        const leftEye = Math.pow((nx - 0.35) / 0.1, 2) + Math.pow((ny - 0.4) / 0.1, 2) <= 1;
        const rightEye = Math.pow((nx - 0.65) / 0.1, 2) + Math.pow((ny - 0.4) / 0.1, 2) <= 1;
        return (top || jaw) && !leftEye && !rightEye;
    },

    // Anchor
    anchor: (x, y, w, h) => {
        const nx = x / (w - 1);
        const ny = y / (h - 1);
        // Ring at top
        const ring = ny <= 0.2 && Math.pow((nx - 0.5) / 0.1, 2) + Math.pow((ny - 0.1) / 0.1, 2) <= 1 && Math.pow((nx - 0.5) / 0.05, 2) + Math.pow((ny - 0.1) / 0.05, 2) > 1;
        // Vertical shaft
        const shaft = nx >= 0.47 && nx <= 0.53 && ny >= 0.15 && ny <= 0.85;
        // Cross bar
        const crossbar = ny >= 0.25 && ny <= 0.3 && nx >= 0.3 && nx <= 0.7;
        // Bottom curve
        const bottomCurve = ny >= 0.7 && Math.pow((nx - 0.5) / 0.35, 2) + Math.pow((ny - 0.7) / 0.2, 2) <= 1 && ny >= 0.75;
        // Flukes
        const leftFluke = nx >= 0.15 && nx <= 0.3 && ny >= 0.8 && ny <= 0.95;
        const rightFluke = nx >= 0.7 && nx <= 0.85 && ny >= 0.8 && ny <= 0.95;
        return ring || shaft || crossbar || bottomCurve || leftFluke || rightFluke;
    },

    // Music note
    musicNote: (x, y, w, h) => {
        const nx = x / (w - 1);
        const ny = y / (h - 1);
        // Note head (oval)
        const head = Math.pow((nx - 0.35) / 0.15, 2) + Math.pow((ny - 0.75) / 0.12, 2) <= 1;
        // Stem
        const stem = nx >= 0.48 && nx <= 0.52 && ny >= 0.15 && ny <= 0.75;
        // Flag
        const flag = nx >= 0.5 && nx <= 0.7 && ny >= 0.15 && ny <= 0.4 && ny >= 0.15 + (nx - 0.5) * 0.5;
        return head || stem || flag;
    },

    // === BUILDING MASKS - Thin corridors only work at high resolution ===

    // Village: 4 small houses with very thin paths between them
    // At low resolution, paths won't be wide enough to sample
    village: (x, y, w, h) => {
        const nx = x / (w - 1);
        const ny = y / (h - 1);
        // Four houses in corners
        const house1 = nx >= 0.05 && nx <= 0.35 && ny >= 0.05 && ny <= 0.35;
        const house2 = nx >= 0.65 && nx <= 0.95 && ny >= 0.05 && ny <= 0.35;
        const house3 = nx >= 0.05 && nx <= 0.35 && ny >= 0.65 && ny <= 0.95;
        const house4 = nx >= 0.65 && nx <= 0.95 && ny >= 0.65 && ny <= 0.95;
        // Thin corridors (2-3% width - only visible at high resolution)
        const corridor = 0.02;
        const hPath1 = ny >= 0.49 - corridor && ny <= 0.51 + corridor && nx >= 0.35 && nx <= 0.65; // horizontal center
        const vPath1 = nx >= 0.49 - corridor && nx <= 0.51 + corridor && ny >= 0.35 && ny <= 0.65; // vertical center
        const hPath2 = ny >= 0.19 - corridor && ny <= 0.21 + corridor && nx >= 0.35 && nx <= 0.65; // top horizontal
        const hPath3 = ny >= 0.79 - corridor && ny <= 0.81 + corridor && nx >= 0.35 && nx <= 0.65; // bottom horizontal
        return house1 || house2 || house3 || house4 || hPath1 || vPath1 || hPath2 || hPath3;
    },

    // Towers: 3 tall thin towers with hairline bridges
    towers: (x, y, w, h) => {
        const nx = x / (w - 1);
        const ny = y / (h - 1);
        // Three towers
        const tower1 = nx >= 0.1 && nx <= 0.25 && ny >= 0.1 && ny <= 0.9;
        const tower2 = nx >= 0.42 && nx <= 0.58 && ny >= 0.05 && ny <= 0.95;
        const tower3 = nx >= 0.75 && nx <= 0.9 && ny >= 0.1 && ny <= 0.9;
        // Very thin bridges (1.5% - nearly invisible at low res)
        const bridge = 0.015;
        const b1 = ny >= 0.3 - bridge && ny <= 0.3 + bridge && nx >= 0.25 && nx <= 0.42;
        const b2 = ny >= 0.3 - bridge && ny <= 0.3 + bridge && nx >= 0.58 && nx <= 0.75;
        const b3 = ny >= 0.7 - bridge && ny <= 0.7 + bridge && nx >= 0.25 && nx <= 0.42;
        const b4 = ny >= 0.7 - bridge && ny <= 0.7 + bridge && nx >= 0.58 && nx <= 0.75;
        return tower1 || tower2 || tower3 || b1 || b2 || b3 || b4;
    },

    // Islands: Scattered small islands with threadlike connections
    islands: (x, y, w, h) => {
        const nx = x / (w - 1);
        const ny = y / (h - 1);
        // 6 small islands of varying sizes
        const i1 = Math.pow((nx - 0.15) / 0.12, 2) + Math.pow((ny - 0.2) / 0.12, 2) <= 1;
        const i2 = Math.pow((nx - 0.5) / 0.15, 2) + Math.pow((ny - 0.15) / 0.1, 2) <= 1;
        const i3 = Math.pow((nx - 0.85) / 0.1, 2) + Math.pow((ny - 0.25) / 0.15, 2) <= 1;
        const i4 = Math.pow((nx - 0.2) / 0.14, 2) + Math.pow((ny - 0.75) / 0.14, 2) <= 1;
        const i5 = Math.pow((nx - 0.5) / 0.18, 2) + Math.pow((ny - 0.6) / 0.12, 2) <= 1;
        const i6 = Math.pow((nx - 0.8) / 0.12, 2) + Math.pow((ny - 0.8) / 0.12, 2) <= 1;
        // Threadlike bridges (1% width - only works at very high res)
        const t = 0.01;
        const b1 = Math.abs(ny - (0.2 + (nx - 0.15) * 0.1)) <= t && nx >= 0.15 && nx <= 0.5;
        const b2 = Math.abs(ny - (0.15 + (nx - 0.5) * 0.3)) <= t && nx >= 0.5 && nx <= 0.85;
        const b3 = Math.abs(ny - (0.6 - (nx - 0.2) * 0.5)) <= t && nx >= 0.2 && nx <= 0.5;
        const b4 = Math.abs(ny - (0.6 + (nx - 0.5) * 0.65)) <= t && nx >= 0.5 && nx <= 0.8;
        return i1 || i2 || i3 || i4 || i5 || i6 || b1 || b2 || b3 || b4;
    },

    // Compound: Main building with small outbuildings, connected by thin paths
    compound: (x, y, w, h) => {
        const nx = x / (w - 1);
        const ny = y / (h - 1);
        // Main central building
        const main = nx >= 0.3 && nx <= 0.7 && ny >= 0.35 && ny <= 0.75;
        // Four small outbuildings
        const out1 = nx >= 0.05 && nx <= 0.2 && ny >= 0.1 && ny <= 0.3;
        const out2 = nx >= 0.8 && nx <= 0.95 && ny >= 0.1 && ny <= 0.3;
        const out3 = nx >= 0.05 && nx <= 0.2 && ny >= 0.7 && ny <= 0.9;
        const out4 = nx >= 0.8 && nx <= 0.95 && ny >= 0.7 && ny <= 0.9;
        // Thin diagonal paths (1.5% wide)
        const t = 0.015;
        const p1 = Math.abs((ny - 0.3) - (nx - 0.2) * 0.5) <= t && nx >= 0.2 && nx <= 0.3;
        const p2 = Math.abs((ny - 0.3) + (nx - 0.8) * 0.5) <= t && nx >= 0.7 && nx <= 0.8;
        const p3 = Math.abs((ny - 0.7) + (nx - 0.2) * 0.5) <= t && nx >= 0.2 && nx <= 0.3;
        const p4 = Math.abs((ny - 0.7) - (nx - 0.8) * 0.5) <= t && nx >= 0.7 && nx <= 0.8;
        return main || out1 || out2 || out3 || out4 || p1 || p2 || p3 || p4;
    },

    // Blocks: City blocks with alleyways
    blocks: (x, y, w, h) => {
        const nx = x / (w - 1);
        const ny = y / (h - 1);
        // 9 city blocks in a 3x3 grid with thin alleys
        const alley = 0.02;
        const gapX = (nx > 0.32 - alley && nx < 0.32 + alley) || (nx > 0.67 - alley && nx < 0.67 + alley);
        const gapY = (ny > 0.32 - alley && ny < 0.32 + alley) || (ny > 0.67 - alley && ny < 0.67 + alley);
        // Include alleys only when within outer bounds
        const inBounds = nx >= 0.05 && nx <= 0.95 && ny >= 0.05 && ny <= 0.95;
        const isAlley = inBounds && (gapX || gapY);
        // Blocks are the spaces between alleys
        const isBlock = inBounds && !((nx > 0.3 && nx < 0.34) || (nx > 0.65 && nx < 0.69) ||
                                       (ny > 0.3 && ny < 0.34) || (ny > 0.65 && ny < 0.69));
        return isBlock || isAlley;
    },

    // Archipelago: Many tiny islands, some completely unreachable
    archipelago: (x, y, w, h) => {
        const nx = x / (w - 1);
        const ny = y / (h - 1);
        // Many small scattered islands (some will be unreachable)
        const islands = [];
        const positions = [
            [0.1, 0.1, 0.08], [0.3, 0.08, 0.06], [0.55, 0.12, 0.09], [0.8, 0.1, 0.07],
            [0.15, 0.35, 0.1], [0.45, 0.3, 0.08], [0.75, 0.35, 0.09],
            [0.08, 0.6, 0.07], [0.35, 0.55, 0.11], [0.6, 0.58, 0.07], [0.88, 0.55, 0.08],
            [0.2, 0.85, 0.09], [0.5, 0.82, 0.08], [0.75, 0.88, 0.1]
        ];
        for (const [cx, cy, r] of positions) {
            if (Math.pow((nx - cx) / r, 2) + Math.pow((ny - cy) / r, 2) <= 1) return true;
        }
        // Only a few threadlike connections (many islands unreachable by design)
        const t = 0.012;
        const c1 = Math.abs(ny - 0.35 - (nx - 0.15) * 0.15) <= t && nx >= 0.15 && nx <= 0.45;
        const c2 = Math.abs(ny - 0.55 + (nx - 0.35) * 0.25) <= t && nx >= 0.35 && nx <= 0.6;
        const c3 = Math.abs(ny - 0.82 - (nx - 0.5) * 0.25) <= t && nx >= 0.5 && nx <= 0.75;
        return c1 || c2 || c3;
    },

    // =============================================================================
    // DOLPHIN THEME-SPECIFIC MASKS - Educational marine scenes
    // =============================================================================

    // Dolphin jumping out of water with waves
    // Educational: Shows iconic breaching behavior dolphins use for communication
    dolphinJump: (x, y, w, h) => {
        const nx = x / (w - 1);
        const ny = y / (h - 1);

        // Dolphin body - curved jumping arc
        // Main body curve
        const bodyCx = 0.5, bodyCy = 0.35;
        const bodyRx = 0.25, bodyRy = 0.15;
        // Rotated ellipse for jumping angle
        const angle = -0.4; // tilted forward
        const cosA = Math.cos(angle), sinA = Math.sin(angle);
        const dxBody = nx - bodyCx, dyBody = ny - bodyCy;
        const rotX = dxBody * cosA + dyBody * sinA;
        const rotY = -dxBody * sinA + dyBody * cosA;
        const inBody = (rotX * rotX) / (bodyRx * bodyRx) + (rotY * rotY) / (bodyRy * bodyRy) <= 1;

        // Rostrum (beak)
        const rostrumStart = 0.7, rostrumWidth = 0.08;
        const inRostrum = nx >= rostrumStart && nx <= 0.85 &&
            Math.abs(ny - (0.3 + (nx - rostrumStart) * 0.3)) <= rostrumWidth * (1 - (nx - rostrumStart) / 0.15);

        // Dorsal fin
        const dorsalX = 0.45, dorsalY = 0.25;
        const inDorsal = nx >= dorsalX && nx <= dorsalX + 0.12 &&
            ny >= dorsalY - 0.15 && ny <= dorsalY &&
            ny <= dorsalY - (nx - dorsalX) * 0.8 &&
            ny >= dorsalY - 0.15 + (nx - dorsalX) * 0.5;

        // Tail fluke
        const flukeX = 0.2, flukeY = 0.45;
        const inUpperFluke = Math.pow((nx - flukeX) / 0.08, 2) + Math.pow((ny - (flukeY - 0.06)) / 0.05, 2) <= 1;
        const inLowerFluke = Math.pow((nx - flukeX) / 0.08, 2) + Math.pow((ny - (flukeY + 0.06)) / 0.05, 2) <= 1;

        // Water/waves at bottom
        const waveBase = 0.7;
        const waveAmp = 0.06;
        const waveFreq = 4;
        const waveLine = waveBase + Math.sin(nx * Math.PI * waveFreq) * waveAmp;
        const inWater = ny >= waveLine && ny <= 1;

        // Splash near dolphin entry point
        const splashCx = 0.25, splashCy = 0.6;
        const inSplash = Math.pow((nx - splashCx) / 0.1, 2) + Math.pow((ny - splashCy) / 0.15, 2) <= 1;

        return inBody || inRostrum || inDorsal || inUpperFluke || inLowerFluke || inWater || inSplash;
    },

    // Tropical ocean scene with palm trees and moon
    // Educational: Shows coastal habitat where dolphins are often spotted
    tropicalSea: (x, y, w, h) => {
        const nx = x / (w - 1);
        const ny = y / (h - 1);

        // Moon in upper right
        const moonCx = 0.8, moonCy = 0.15, moonR = 0.1;
        const inMoon = Math.pow((nx - moonCx) / moonR, 2) + Math.pow((ny - moonCy) / moonR, 2) <= 1;

        // Palm tree on left island
        // Trunk
        const trunkX = 0.12;
        const inTrunk = nx >= trunkX - 0.02 && nx <= trunkX + 0.02 && ny >= 0.25 && ny <= 0.55;

        // Palm fronds (simplified)
        const frondCy = 0.22;
        const inFrond1 = ny >= 0.1 && ny <= frondCy && nx >= 0.02 && nx <= trunkX &&
            ny >= 0.1 + (nx - 0.02) * 0.5;
        const inFrond2 = ny >= 0.1 && ny <= frondCy && nx >= trunkX && nx <= 0.25 &&
            ny >= 0.1 + (0.25 - nx) * 0.6;
        const inFrond3 = ny >= 0.15 && ny <= 0.25 && nx >= 0.05 && nx <= 0.2;

        // Left island/beach
        const inLeftIsland = ny >= 0.5 && ny <= 0.65 &&
            nx <= 0.25 && Math.pow((nx - 0) / 0.25, 2) + Math.pow((ny - 0.5) / 0.15, 2) <= 1.2;

        // Right island with palm
        const inRightIsland = ny >= 0.55 && ny <= 0.68 &&
            nx >= 0.75 && Math.pow((nx - 1) / 0.25, 2) + Math.pow((ny - 0.55) / 0.13, 2) <= 1.2;

        // Right palm trunk
        const rTrunkX = 0.88;
        const inRTrunk = nx >= rTrunkX - 0.015 && nx <= rTrunkX + 0.015 && ny >= 0.35 && ny <= 0.55;
        const inRFrond = ny >= 0.28 && ny <= 0.38 && nx >= 0.78 && nx <= 0.98;

        // Ocean - main area
        const oceanTop = 0.6;
        const waveAmp = 0.03;
        const waveLine = oceanTop + Math.sin(nx * Math.PI * 3) * waveAmp;
        const inOcean = ny >= waveLine;

        // Dolphin silhouette in water
        const dCx = 0.5, dCy = 0.75;
        const inDolphin = Math.pow((nx - dCx) / 0.15, 2) + Math.pow((ny - dCy) / 0.06, 2) <= 1;
        const inDFin = nx >= dCx - 0.02 && nx <= dCx + 0.04 && ny >= dCy - 0.12 && ny <= dCy - 0.02 &&
            ny >= dCy - 0.12 + (nx - (dCx - 0.02)) * 1.5;

        return inMoon || inTrunk || inFrond1 || inFrond2 || inFrond3 || inLeftIsland ||
               inRightIsland || inRTrunk || inRFrond || inOcean || inDolphin || inDFin;
    },

    // Pod of dolphins swimming - shows social behavior
    // Educational: Dolphins are highly social, living in groups called pods
    dolphinPod: (x, y, w, h) => {
        const nx = x / (w - 1);
        const ny = y / (h - 1);

        // Multiple dolphins at different positions
        const dolphins = [
            { cx: 0.25, cy: 0.3, rx: 0.12, ry: 0.06, angle: 0.2 },   // Leader
            { cx: 0.5, cy: 0.4, rx: 0.14, ry: 0.07, angle: 0.1 },    // Center
            { cx: 0.75, cy: 0.35, rx: 0.11, ry: 0.055, angle: -0.1 }, // Right
            { cx: 0.35, cy: 0.55, rx: 0.1, ry: 0.05, angle: 0.15 },  // Lower left
            { cx: 0.6, cy: 0.6, rx: 0.08, ry: 0.04, angle: 0 },      // Calf
            { cx: 0.85, cy: 0.55, rx: 0.09, ry: 0.045, angle: -0.2 } // Lower right
        ];

        for (const d of dolphins) {
            const dx = nx - d.cx, dy = ny - d.cy;
            const cosA = Math.cos(d.angle), sinA = Math.sin(d.angle);
            const rotX = dx * cosA + dy * sinA;
            const rotY = -dx * sinA + dy * cosA;
            if ((rotX * rotX) / (d.rx * d.rx) + (rotY * rotY) / (d.ry * d.ry) <= 1) return true;

            // Dorsal fins
            const finX = d.cx - d.rx * 0.2;
            const finTop = d.cy - d.ry - 0.03;
            if (nx >= finX - 0.02 && nx <= finX + 0.03 &&
                ny >= finTop && ny <= d.cy - d.ry * 0.5 &&
                ny >= finTop + (nx - finX + 0.02) * 0.8) return true;
        }

        // Wave pattern at bottom
        const waveY = 0.8 + Math.sin(nx * Math.PI * 4) * 0.03;
        if (ny >= waveY) return true;

        return false;
    },

    // Ocean waves pattern - shows marine environment
    // Educational: Dolphins use waves to help them swim efficiently
    oceanWaves: (x, y, w, h) => {
        const nx = x / (w - 1);
        const ny = y / (h - 1);

        // Multiple wave layers
        const wave1 = 0.25 + Math.sin(nx * Math.PI * 2.5 + 0.5) * 0.08;
        const wave2 = 0.45 + Math.sin(nx * Math.PI * 3 + 1) * 0.07;
        const wave3 = 0.65 + Math.sin(nx * Math.PI * 2 + 2) * 0.09;
        const wave4 = 0.85 + Math.sin(nx * Math.PI * 3.5) * 0.06;

        // Each wave is a band
        const inWave1 = ny >= wave1 - 0.06 && ny <= wave1 + 0.06;
        const inWave2 = ny >= wave2 - 0.07 && ny <= wave2 + 0.07;
        const inWave3 = ny >= wave3 - 0.08 && ny <= wave3 + 0.08;
        const inWave4 = ny >= wave4 - 0.05 && ny <= wave4 + 0.05;

        // Foam/crest areas
        const inCrest1 = ny >= wave1 - 0.03 && ny <= wave1 + 0.03;
        const inCrest2 = ny >= wave2 - 0.03 && ny <= wave2 + 0.03;

        // Bottom ocean
        const inDeep = ny >= 0.92;

        return inWave1 || inWave2 || inWave3 || inWave4 || inDeep;
    }
};

    lollipopForest: (x, y, size) => {
        const s = size * 0.35;
        let svg = '';
        const positions = [[-0.5, 0], [0, -0.2], [0.5, 0.1]];
        for (let i = 0; i < positions.length; i++) {
            const [px, py] = positions[i];
            const lx = x + px * s;
            const ly = y + py * s;
            const r = s * (0.3 + i * 0.05);
            svg += `<line x1="${lx}" y1="${ly}" x2="${lx}" y2="${ly+s*0.8}" stroke="currentColor" stroke-width="1.3"/>`;
            svg += `<circle cx="${lx}" cy="${ly-r*0.3}" r="${r}" fill="none" stroke="currentColor" stroke-width="1"/>`;
            svg += `<path d="M${lx-r*0.7},${ly-r*0.3} Q${lx},${ly-r} ${lx+r*0.7},${ly-r*0.3}" fill="none" stroke="currentColor" stroke-width="1"/>`;

        return svg;

// =============================================================================
// ADAPTIVE MARGIN ARTWORK - fills unused page/shape whitespace intelligently
// =============================================================================

const AdaptiveMarginArtwork = {
    PAGE_INSET: 10,

    clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
    },

    fmt(value) {
        if (!Number.isFinite(value)) return '0';
        return Number(value.toFixed(3)).toString();
    },

    hashString(value) {
        let hash = 2166136261;
        const text = String(value || '');
        for (let i = 0; i < text.length; i++) {
            hash ^= text.charCodeAt(i);
            hash = Math.imul(hash, 16777619);
        }
        return hash >>> 0;
    },

    createRng(maze, salt = 'margin') {
        const seedBase = Number.isFinite(maze.seed) ? maze.seed : (maze.width * 73856093) ^ (maze.height * 19349663);
        const saltHash = this.hashString(`${salt}|${maze.shape}|${maze.theme?.name || 'theme'}`);
        return new SeededRandom((seedBase ^ saltHash) >>> 0);
    },

    rect(left, top, right, bottom, name = '') {
        return { left, top, right, bottom, name };
    },

    rectWidth(rect) {
        return Math.max(0, rect.right - rect.left);
    },

    rectHeight(rect) {
        return Math.max(0, rect.bottom - rect.top);
    },

    rectArea(rect) {
        return this.rectWidth(rect) * this.rectHeight(rect);
    },

    inflate(rect, pad) {
        return {
            left: rect.left - pad,
            top: rect.top - pad,
            right: rect.right + pad,
            bottom: rect.bottom + pad,
            name: rect.name || ''
        };
    },

    overlaps(a, b, pad = 0) {
        return a.left < b.right + pad &&
               a.right > b.left - pad &&
               a.top < b.bottom + pad &&
               a.bottom > b.top - pad;
    },

    containsPage(rect, geom) {
        return rect.left >= this.PAGE_INSET && rect.top >= this.PAGE_INSET &&
               rect.right <= geom.svgWidth - this.PAGE_INSET &&
               rect.bottom <= geom.svgHeight - this.PAGE_INSET;
    },

    uniqueRefs(refs) {
        const seen = new Set();
        const output = [];
        for (const ref of refs) {
            if (!ref || !ref.art) continue;
            const key = `${ref.type}:${ref.art}`;
            if (seen.has(key)) continue;
            seen.add(key);
            output.push(ref);
        }
        return output;
    },

    getArtPools(maze) {
        const theme = maze.theme || Themes.classic;
        const heroRefs = [];
        const patternRefs = [];

        if (maze.selectedGoal && GoalArt[maze.selectedGoal]) {
            heroRefs.push({ type: 'goal', art: maze.selectedGoal });
        }
        if (maze.selectedCharacter && CharacterArt[maze.selectedCharacter]) {
            heroRefs.push({ type: 'character', art: maze.selectedCharacter });
        }

        for (const goal of theme.goals || []) {
            if (goal?.art && GoalArt[goal.art]) heroRefs.push({ type: 'goal', art: goal.art });
        }
        for (const character of theme.characters || []) {
            if (character?.art && CharacterArt[character.art]) heroRefs.push({ type: 'character', art: character.art });
        }
        for (const art of theme.decorations || []) {
            if (ArtGenerators[art]) {
                const ref = { type: 'decoration', art };
                patternRefs.push(ref);
                // Decorations can act as hero art when a theme has fewer large assets.
                heroRefs.push(ref);
            }
        }

        const heroes = this.uniqueRefs(heroRefs);
        const patterns = this.uniqueRefs(patternRefs.length > 0 ? patternRefs : heroRefs);
        return { heroes, patterns };
    },

    renderArtReference(ref, x, y, size, rng, options = {}) {
        if (!ref || !ref.art || size <= 0) return '';

        let fn = null;
        if (ref.type === 'goal') fn = GoalArt[ref.art];
        else if (ref.type === 'character') fn = CharacterArt[ref.art];
        else fn = ArtGenerators[ref.art];

        if (typeof fn !== 'function') return '';

        let art = '';
        try {
            art = ref.type === 'decoration' ? fn(x, y, size, rng) : fn(x, y, size);
        } catch (error) {
            return '';
        }
        if (!art) return '';

        const strokeWidth = Math.max(options.minStroke || 0.5, size * (options.strokePct || 0.025));
        art = art.replace(/stroke-width="([0-9.]+)"/g, () => `stroke-width="${this.fmt(strokeWidth)}"`);

        const opacity = this.fmt(options.opacity ?? 1);
        const angle = options.angle || 0;
        const transform = Math.abs(angle) > 0.01 ? ` transform="rotate(${this.fmt(angle)} ${this.fmt(x)} ${this.fmt(y)})"` : '';
        return `<g${transform} opacity="${opacity}">${art}</g>`;
    },

    getAvoidRects(maze, geom) {
        const avoid = [];
        const mazeRect = this.rect(geom.sidePadding, geom.topPadding,
            geom.sidePadding + geom.mazeWidth, geom.topPadding + geom.mazeHeight, 'maze');
        avoid.push(this.inflate(mazeRect, 8));

        // Reserve the whole title and quest bands. This keeps ambient artwork
        // from competing with the puzzle instructions even when titles wrap wide.
        avoid.push(this.rect(0, 0, geom.svgWidth, geom.TOP_MARGIN + geom.TITLE_AREA_HEIGHT + 6, 'title-band'));
        avoid.push(this.rect(0, geom.svgHeight - geom.QUEST_AREA_HEIGHT - geom.BOTTOM_MARGIN - 6,
            geom.svgWidth, geom.svgHeight, 'quest-band'));

        const labelDims = {
            sidePadding: geom.sidePadding,
            topPadding: geom.topPadding,
            mazeWidth: geom.mazeWidth,
            mazeHeight: geom.mazeHeight,
            svgWidth: geom.svgWidth,
            svgHeight: geom.svgHeight
        };

        if (maze.startPos) {
            const roomSize = maze.startRoomSize || 2;
            const roomLeft = geom.sidePadding + maze.startPos.x * geom.cellSize;
            const roomTop = geom.topPadding + maze.startPos.y * geom.cellSize;
            const roomWidth = roomSize * geom.cellSize;
            const roomHeight = roomSize * geom.cellSize;
            const layout = getExternalRoomLabelLayout('START', 'start', { ...labelDims, roomLeft, roomTop, roomWidth, roomHeight });
            if (layout?.bounds) avoid.push(this.inflate(layout.bounds, 10));
        }

        if (maze.endPos) {
            const roomSize = maze.endRoomSize || 2;
            const roomLeft = geom.sidePadding + maze.endPos.x * geom.cellSize;
            const roomTop = geom.topPadding + maze.endPos.y * geom.cellSize;
            const roomWidth = roomSize * geom.cellSize;
            const roomHeight = roomSize * geom.cellSize;
            const layout = getExternalRoomLabelLayout('END', 'end', { ...labelDims, roomLeft, roomTop, roomWidth, roomHeight });
            if (layout?.bounds) avoid.push(this.inflate(layout.bounds, 10));
        }

        return avoid;
    },

    getMarginRegions(geom) {
        const contentTop = geom.TOP_MARGIN + geom.TITLE_AREA_HEIGHT + 8;
        const contentBottom = geom.svgHeight - geom.QUEST_AREA_HEIGHT - geom.BOTTOM_MARGIN - 8;
        const mazeLeft = geom.sidePadding;
        const mazeRight = geom.sidePadding + geom.mazeWidth;
        const mazeTop = geom.topPadding;
        const mazeBottom = geom.topPadding + geom.mazeHeight;
        const regions = [
            this.rect(this.PAGE_INSET, contentTop, mazeLeft - 12, contentBottom, 'left-rail'),
            this.rect(mazeRight + 12, contentTop, geom.svgWidth - this.PAGE_INSET, contentBottom, 'right-rail'),
            this.rect(mazeLeft + 14, contentTop, mazeRight - 14, mazeTop - 10, 'above-maze'),
            this.rect(mazeLeft + 14, mazeBottom + 10, mazeRight - 14, contentBottom, 'below-maze')
        ];

        return regions.filter(region => this.rectWidth(region) >= 24 && this.rectHeight(region) >= 24);
    },

    candidateIsClear(rect, geom, avoidRects, placedRects) {
        if (!this.containsPage(rect, geom)) return false;
        for (const avoid of avoidRects) {
            if (this.overlaps(rect, avoid, 0)) return false;
        }
        for (const placed of placedRects) {
            if (this.overlaps(rect, placed, 8)) return false;
        }
        return true;
    },

    renderMarginHeroArt(maze, geom, rng, pools, color, printMode, avoidRects, placedRects) {
        if (!pools.heroes.length) return '';
        const minHeroPixels = (DebugSettings.marginArtMinHeroInches || 0.55) * (geom.PAGE_WIDTH / 8.5);
        const maxHeroes = Math.max(0, Math.min(4, DebugSettings.marginArtHeroCount || 0));
        if (maxHeroes <= 0) return '';

        const regions = this.getMarginRegions(geom)
            .sort((a, b) => this.rectArea(b) - this.rectArea(a));

        let svg = '';
        let count = 0;
        for (const region of regions) {
            if (count >= maxHeroes) break;
            const minDim = Math.min(this.rectWidth(region), this.rectHeight(region));
            const size = this.clamp(minDim * 0.82, minHeroPixels, 155);
            if (size < minHeroPixels || minDim < minHeroPixels * 0.92) continue;

            for (let attempt = 0; attempt < 10; attempt++) {
                const jitterX = (rng.next() - 0.5) * Math.max(0, this.rectWidth(region) - size) * 0.45;
                const jitterY = (rng.next() - 0.5) * Math.max(0, this.rectHeight(region) - size) * 0.45;
                const x = (region.left + region.right) / 2 + jitterX;
                const y = (region.top + region.bottom) / 2 + jitterY;
                const rect = this.rect(x - size / 2, y - size / 2, x + size / 2, y + size / 2, 'margin-hero');
                if (!this.candidateIsClear(rect, geom, avoidRects, placedRects)) continue;

                const ref = rng.choice(pools.heroes);
                const opacityBase = printMode ? DebugSettings.marginArtPrintOpacity : DebugSettings.marginArtOpacity;
                const opacity = this.clamp((opacityBase || 0.22) * 1.12, 0.08, 0.34);
                const angle = rng.nextInt(-8, 8);
                svg += this.renderArtReference(ref, x, y, size, rng, {
                    opacity,
                    angle,
                    strokePct: 0.022,
                    minStroke: printMode ? 0.7 : 0.55
                });
                placedRects.push(rect);
                count++;
                break;
            }
        }

        return svg ? `<g class="ambient-margin-hero" style="color:${color}; stroke:${color}; fill:${color}">${svg}</g>` : '';
    },

    renderMarginPatternArt(maze, geom, rng, pools, color, printMode, avoidRects, placedRects) {
        if (!pools.patterns.length) return '';
