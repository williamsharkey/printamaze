<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Print A Maze</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            touch-action: pan-y;
        }

        /* Favorites section - pull down to reveal */
        #favoritesSection {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            transform: translateY(-100%);
            background: #1a1a1a;
            max-height: 60vh;
            overflow-y: auto;
            z-index: 50;
            padding: 20px;
            padding-top: max(20px, env(safe-area-inset-top));
            transition: transform 0.3s ease;
        }
        #favoritesSection.open { transform: translateY(0); }
        #favoritesSection h2 { color: #fff; font-size: 16px; margin-bottom: 15px; }
        .fav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
        }
        .fav-item {
            aspect-ratio: 8.5/11;
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
        }
        .fav-item svg { width: 100%; height: 100%; }
        .no-favs { color: #666; font-size: 14px; text-align: center; padding: 30px; }

        /* Main maze container with snap scroll */
        #mazeContainer {
            height: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            -webkit-overflow-scrolling: touch;
        }

        .maze-frame {
            height: 100vh;
            height: 100dvh;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        .maze-svg-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .maze-svg-container svg {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
        }

        /* Heart favorite button - upper right */
        .heart-btn {
            position: absolute;
            top: max(15px, env(safe-area-inset-top));
            right: max(15px, env(safe-area-inset-right));
            width: 44px;
            height: 44px;
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            opacity: 0.3;
            z-index: 10;
            -webkit-tap-highlight-color: transparent;
        }
        .heart-btn.favorited { opacity: 1; color: #e74c3c; }

        /* Level indicator - subtle */
        .level-indicator {
            position: absolute;
            bottom: max(15px, env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            z-index: 10;
        }
        .level-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
        }
        .level-dot.active { background: rgba(255,255,255,0.8); }

        /* Action menu overlay */
        #actionMenu {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            -webkit-backdrop-filter: blur(5px);
            backdrop-filter: blur(5px);
        }
        #actionMenu.open { display: flex; }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 200px;
        }

        .action-btn {
            padding: 14px 20px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            background: #fff;
            color: #333;
            font-weight: 500;
            -webkit-tap-highlight-color: transparent;
        }
        .action-btn:active { background: #eee; }
        .action-btn.close-btn {
            background: transparent;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* Solution overlay */
        #solutionOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 150;
            padding: 20px;
        }
        #solutionOverlay.open { display: flex; }
        #solutionOverlay svg { max-width: 100%; max-height: 100%; }
        #solutionOverlay .close-btn {
            position: absolute;
            top: max(15px, env(safe-area-inset-top));
            right: max(15px, env(safe-area-inset-right));
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 50%;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
        }

        /* Debug panel */
        #debugPanel {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.9);
            color: #fff;
            padding: 15px;
            font-family: monospace;
            font-size: 11px;
            z-index: 200;
            max-height: 40vh;
            overflow-y: auto;
        }

        /* Swipe hint on first load */
        .swipe-hint {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.5);
            font-size: 12px;
            text-align: center;
            z-index: 5;
            animation: fadeOut 3s forwards 2s;
        }
        @keyframes fadeOut { to { opacity: 0; } }
    </style>
</head>
<body>
    <!-- Favorites - pull down to reveal -->
    <div id="favoritesSection">
        <h2>Saved Mazes</h2>
        <div id="favGrid" class="fav-grid"></div>
        <div id="noFavs" class="no-favs">No saved mazes yet. Tap the heart to save one!</div>
    </div>

    <!-- Main scrolling maze container -->
    <div id="mazeContainer"></div>

    <!-- Action menu -->
    <div id="actionMenu">
        <div class="action-buttons">
            <button class="action-btn" onclick="printColor()">🖨️ Print Color</button>
            <button class="action-btn" onclick="printBW()">📄 Print B&W</button>
            <button class="action-btn" onclick="saveToCameraRoll()">📷 Save to Photos</button>
            <button class="action-btn" onclick="showSolution()">🔍 Show Solution</button>
            <button class="action-btn" id="debugBtn" style="display:none" onclick="showDebugInfo()">🔧 Debug Info</button>
            <button class="action-btn close-btn" onclick="closeActionMenu()">✕ Close</button>
        </div>
    </div>

    <!-- Solution overlay -->
    <div id="solutionOverlay">
        <button class="close-btn" onclick="closeSolution()">✕</button>
        <div id="solutionDisplay"></div>
    </div>

    <!-- Debug panel -->
    <div id="debugPanel">
        <strong>Debug Info</strong>
        <pre id="debugContent"></pre>
    </div>

    <!-- Swipe hint -->
    <div class="swipe-hint" id="swipeHint">← Swipe to change difficulty →</div>

    <script src="maze.js"></script>
    <script>
        const ALL_THEMES = ['classic', 'ocean', 'space', 'garden', 'candy', 'jungle'];
        const ALL_SHAPES = ['rectangle', 'circle', 'heart', 'star', 'hexagon'];
        const ALL_ALGORITHMS = ['recursive_backtracker', 'prims', 'kruskals'];
        const DIFFICULTY_SIZES = {
            3: { w: 5, h: 6 },
            4: { w: 7, h: 9 },
            5: { w: 10, h: 13 },
            6: { w: 13, h: 17 },
            7: { w: 17, h: 22 },
            8: { w: 21, h: 27 },
            9: { w: 27, h: 35 },
            10: { w: 33, h: 43 },
            11: { w: 39, h: 50 },
            12: { w: 45, h: 58 }
        };

        let currentDifficulty = 4;
        let mazeParams = []; // Array of {seed, theme, shape, algorithm} per position
        let currentIndex = 0;
        let activeMazeId = null;
        let touchStartX = 0;
        let touchStartY = 0;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            // Show debug button if debug mode
            if (localStorage.getItem('debug')) {
                document.getElementById('debugBtn').style.display = 'block';
            }

            // Generate initial mazes
            generateMazeParams(20);
            renderMazes();

            // Hide swipe hint after first interaction
            document.getElementById('mazeContainer').addEventListener('scroll', () => {
                document.getElementById('swipeHint').style.display = 'none';
            }, { once: true });

            // Infinite scroll
            const container = document.getElementById('mazeContainer');
            container.addEventListener('scroll', handleScroll);

            // Swipe detection for difficulty change
            container.addEventListener('touchstart', handleTouchStart, { passive: true });
            container.addEventListener('touchend', handleTouchEnd, { passive: true });

            // Pull down for favorites
            let pullStartY = 0;
            container.addEventListener('touchstart', e => {
                if (container.scrollTop <= 0) {
                    pullStartY = e.touches[0].clientY;
                }
            }, { passive: true });
            container.addEventListener('touchmove', e => {
                if (container.scrollTop <= 0 && pullStartY > 0) {
                    const pullDist = e.touches[0].clientY - pullStartY;
                    if (pullDist > 80) {
                        showFavorites();
                        pullStartY = 0;
                    }
                }
            }, { passive: true });
        });

        function generateMazeParams(count) {
            const startIdx = mazeParams.length;
            for (let i = 0; i < count; i++) {
                const seed = startIdx + i + 1;
                const rng = new SeededRandom(seed);
                mazeParams.push({
                    seed,
                    theme: ALL_THEMES[Math.floor(rng.next() * ALL_THEMES.length)],
                    shape: ALL_SHAPES[Math.floor(rng.next() * ALL_SHAPES.length)],
                    algorithm: ALL_ALGORITHMS[Math.floor(rng.next() * ALL_ALGORITHMS.length)]
                });
            }
        }

        function renderMazes() {
            const container = document.getElementById('mazeContainer');
            container.innerHTML = '';

            mazeParams.forEach((params, idx) => {
                const frame = createMazeFrame(params, idx);
                container.appendChild(frame);
            });
        }

        function createMazeFrame(params, idx) {
            const dims = DIFFICULTY_SIZES[currentDifficulty];
            const levelNum = currentDifficulty - 2;

            const gen = new MazeGenerator(params.seed);
            const maze = gen.generateWithStory(dims.w, dims.h, params.algorithm, params.shape, params.theme, false, levelNum);

            // Store maze for later use
            window.mazeCache = window.mazeCache || {};
            window.mazeCache[params.seed] = { maze, params, difficulty: currentDifficulty };

            const frame = document.createElement('div');
            frame.className = 'maze-frame';
            frame.dataset.seed = params.seed;
            frame.dataset.idx = idx;

            // Heart button
            const heart = document.createElement('button');
            heart.className = 'heart-btn' + (isFavorited(params.seed) ? ' favorited' : '');
            heart.innerHTML = '♥';
            heart.onclick = (e) => {
                e.stopPropagation();
                toggleFavorite(params.seed, heart);
            };
            frame.appendChild(heart);

            // Maze SVG
            const svgContainer = document.createElement('div');
            svgContainer.className = 'maze-svg-container';
            svgContainer.innerHTML = maze.toSVG(false, false);
            svgContainer.onclick = (e) => {
                if (e.target.closest('.heart-btn')) return;
                activeMazeId = params.seed;
                openActionMenu();
            };
            frame.appendChild(svgContainer);

            // Level dots
            const levelIndicator = document.createElement('div');
            levelIndicator.className = 'level-indicator';
            for (let i = 3; i <= 12; i++) {
                const dot = document.createElement('div');
                dot.className = 'level-dot' + (i === currentDifficulty ? ' active' : '');
                levelIndicator.appendChild(dot);
            }
            frame.appendChild(levelIndicator);

            return frame;
        }

        function handleScroll() {
            const container = document.getElementById('mazeContainer');
            const scrollPos = container.scrollTop;
            const frameHeight = window.innerHeight;
            currentIndex = Math.round(scrollPos / frameHeight);

            // Load more mazes when near the end
            if (currentIndex >= mazeParams.length - 5) {
                generateMazeParams(10);
                const existingFrames = container.children.length;
                for (let i = existingFrames; i < mazeParams.length; i++) {
                    container.appendChild(createMazeFrame(mazeParams[i], i));
                }
            }
        }

        function handleTouchStart(e) {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }

        function handleTouchEnd(e) {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            const deltaX = touchEndX - touchStartX;
            const deltaY = touchEndY - touchStartY;

            // Only trigger if horizontal swipe is dominant
            if (Math.abs(deltaX) > 80 && Math.abs(deltaX) > Math.abs(deltaY) * 2) {
                if (deltaX < 0 && currentDifficulty < 12) {
                    // Swipe left - increase difficulty
                    changeDifficulty(currentDifficulty + 1);
                } else if (deltaX > 0 && currentDifficulty > 3) {
                    // Swipe right - decrease difficulty
                    changeDifficulty(currentDifficulty - 1);
                }
            }
        }

        function changeDifficulty(newDifficulty) {
            currentDifficulty = newDifficulty;
            const container = document.getElementById('mazeContainer');
            const scrollPos = container.scrollTop;

            // Re-render all mazes at new difficulty
            renderMazes();

            // Restore scroll position
            container.scrollTop = scrollPos;
        }

        // Favorites
        function getFavorites() {
            try {
                return JSON.parse(localStorage.getItem('mazejs-favorites') || '[]');
            } catch { return []; }
        }

        function saveFavorites(favs) {
            localStorage.setItem('mazejs-favorites', JSON.stringify(favs));
        }

        function isFavorited(seed) {
            return getFavorites().some(f => f.seed === seed);
        }

        function toggleFavorite(seed, btn) {
            const cached = window.mazeCache[seed];
            if (!cached) return;

            let favs = getFavorites();
            const idx = favs.findIndex(f => f.seed === seed);

            if (idx >= 0) {
                favs.splice(idx, 1);
                btn.classList.remove('favorited');
            } else {
                favs.unshift({ // Add to beginning (most recent first)
                    seed,
                    theme: cached.params.theme,
                    shape: cached.params.shape,
                    algorithm: cached.params.algorithm,
                    difficulty: cached.difficulty,
                    savedAt: Date.now()
                });
                btn.classList.add('favorited');
            }
            saveFavorites(favs);
        }

        function showFavorites() {
            const section = document.getElementById('favoritesSection');
            const grid = document.getElementById('favGrid');
            const noFavs = document.getElementById('noFavs');
            const favs = getFavorites();

            grid.innerHTML = '';

            if (favs.length === 0) {
                noFavs.style.display = 'block';
            } else {
                noFavs.style.display = 'none';
                favs.forEach(fav => {
                    const dims = DIFFICULTY_SIZES[fav.difficulty] || DIFFICULTY_SIZES[4];
                    const gen = new MazeGenerator(fav.seed);
                    const maze = gen.generateWithStory(dims.w, dims.h, fav.algorithm, fav.shape, fav.theme, false, fav.difficulty - 2);

                    const item = document.createElement('div');
                    item.className = 'fav-item';
                    item.innerHTML = maze.toSVG(false, false);
                    item.onclick = () => {
                        closeFavorites();
                        scrollToSeed(fav.seed);
                    };
                    grid.appendChild(item);
                });
            }

            section.classList.add('open');

            // Close on tap outside
            setTimeout(() => {
                document.addEventListener('click', closeFavoritesOnOutsideClick);
            }, 100);
        }

        function closeFavorites() {
            document.getElementById('favoritesSection').classList.remove('open');
            document.removeEventListener('click', closeFavoritesOnOutsideClick);
        }

        function closeFavoritesOnOutsideClick(e) {
            if (!e.target.closest('#favoritesSection')) {
                closeFavorites();
            }
        }

        function scrollToSeed(seed) {
            // Find or create the maze with this seed
            let idx = mazeParams.findIndex(p => p.seed === seed);
            if (idx === -1) {
                // Add it
                const fav = getFavorites().find(f => f.seed === seed);
                if (fav) {
                    mazeParams.unshift({ seed, theme: fav.theme, shape: fav.shape, algorithm: fav.algorithm });
                    renderMazes();
                    idx = 0;
                }
            }
            if (idx >= 0) {
                document.getElementById('mazeContainer').children[idx].scrollIntoView({ behavior: 'smooth' });
            }
        }

        // Action menu
        function openActionMenu() {
            document.getElementById('actionMenu').classList.add('open');
        }

        function closeActionMenu() {
            document.getElementById('actionMenu').classList.remove('open');
        }

        function getPrintCSS() {
            return `
                * { margin: 0; padding: 0; box-sizing: border-box; }
                @page { size: letter; margin: 0.25in; }
                html, body {
                    width: 100%;
                    height: 100%;
                    overflow: hidden;
                }
                body {
                    display: flex;
                    align-items: center;
                    justify-content: center;
                }
                .print-container {
                    width: 8in;
                    height: 10.5in;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                }
                svg {
                    max-width: 100%;
                    max-height: 100%;
                    width: auto;
                    height: auto;
                }
                .back-btn {
                    position: fixed;
                    top: 10px;
                    left: 10px;
                    padding: 8px 16px;
                    background: #333;
                    color: #fff;
                    border: none;
                    border-radius: 6px;
                    font-size: 14px;
                    cursor: pointer;
                    z-index: 100;
                }
                @media print {
                    .back-btn { display: none; }
                }
            `;
        }

        function printColor() {
            closeActionMenu();
            const cached = window.mazeCache[activeMazeId];
            if (!cached) return;

            const w = window.open('', '_blank');
            const title = cached.maze.story?.title || 'Maze';
            w.document.write(`<!DOCTYPE html><html><head><title>${title}</title>
                <style>${getPrintCSS()}</style></head><body>
                <button class="back-btn" onclick="history.back()">← Back</button>
                <div class="print-container">
                    ${cached.maze.toSVG(false, false)}
                </div>
            </body></html>`);
            w.document.close();
            setTimeout(() => w.print(), 100);
        }

        function printBW() {
            closeActionMenu();
            const cached = window.mazeCache[activeMazeId];
            if (!cached) return;

            const w = window.open('', '_blank');
            const title = cached.maze.story?.title || 'Maze';
            w.document.write(`<!DOCTYPE html><html><head><title>${title}</title>
                <style>${getPrintCSS()}</style></head><body>
                <button class="back-btn" onclick="history.back()">← Back</button>
                <div class="print-container">
                    ${cached.maze.toSVG(false, true)}
                </div>
            </body></html>`);
            w.document.close();
            setTimeout(() => w.print(), 100);
        }

        function getMazeFilename(cached) {
            const story = cached.maze.story || {};
            const character = story.character || 'maze';
            const goal = story.goal || 'finish';
            const level = cached.difficulty - 2;
            // Clean up for filename: lowercase, replace spaces with dashes
            const clean = str => str.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
            return `${clean(character)}-to-${clean(goal)}-level-${level}.png`;
        }

        function saveToCameraRoll() {
            closeActionMenu();
            const cached = window.mazeCache[activeMazeId];
            if (!cached) return;

            // Render SVG to high-res PNG
            const svgString = cached.maze.toSVG(false, false);
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            // High resolution for print quality
            const scale = 4;
            canvas.width = 850 * scale;  // 8.5 inches at 100dpi * scale
            canvas.height = 1100 * scale; // 11 inches at 100dpi * scale

            const img = new Image();
            const svgBlob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
            const url = URL.createObjectURL(svgBlob);

            img.onload = () => {
                ctx.fillStyle = '#fff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Center the maze
                const imgAspect = img.width / img.height;
                const canvasAspect = canvas.width / canvas.height;
                let drawW, drawH, drawX, drawY;

                if (imgAspect > canvasAspect) {
                    drawW = canvas.width * 0.9;
                    drawH = drawW / imgAspect;
                } else {
                    drawH = canvas.height * 0.9;
                    drawW = drawH * imgAspect;
                }
                drawX = (canvas.width - drawW) / 2;
                drawY = (canvas.height - drawH) / 2;

                ctx.drawImage(img, drawX, drawY, drawW, drawH);
                URL.revokeObjectURL(url);

                const filename = getMazeFilename(cached);

                canvas.toBlob(async blob => {
                    // Try Web Share API first (iOS native share sheet)
                    if (navigator.canShare && navigator.canShare({ files: [new File([blob], filename, { type: 'image/png' })] })) {
                        try {
                            await navigator.share({
                                files: [new File([blob], filename, { type: 'image/png' })]
                            });
                            return;
                        } catch (e) {
                            // User cancelled or share failed, fall back to download
                            if (e.name === 'AbortError') return;
                        }
                    }
                    // Fallback: direct download
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = filename;
                    a.click();
                    URL.revokeObjectURL(a.href);
                }, 'image/png');
            };
            img.src = url;
        }

        function showSolution() {
            closeActionMenu();
            const cached = window.mazeCache[activeMazeId];
            if (!cached) return;

            document.getElementById('solutionDisplay').innerHTML = cached.maze.toSVG(true, false);
            document.getElementById('solutionOverlay').classList.add('open');
        }

        function closeSolution() {
            document.getElementById('solutionOverlay').classList.remove('open');
        }

        function showDebugInfo() {
            closeActionMenu();
            const cached = window.mazeCache[activeMazeId];
            if (!cached) return;

            const debug = generateMazeDebugOutput(cached.maze);
            document.getElementById('debugContent').textContent = debug;
            document.getElementById('debugPanel').style.display = 'block';

            // Close on tap
            setTimeout(() => {
                document.addEventListener('click', () => {
                    document.getElementById('debugPanel').style.display = 'none';
                }, { once: true });
            }, 100);
        }

        // Close overlays on escape
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                closeActionMenu();
                closeSolution();
                closeFavorites();
            }
        });
    </script>
</body>
</html>
