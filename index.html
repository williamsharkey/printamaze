<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MazeJS</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
        }
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: white;
            padding: 8px 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .header h1 { font-size: 18px; color: #333; }
        .header select, .header input {
            padding: 6px 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 13px;
        }
        .seed-input { width: 70px; opacity: 0.5; font-size: 11px !important; }
        .seed-input:focus { opacity: 1; }
        .toggle-label { display: flex; align-items: center; gap: 4px; font-size: 13px; cursor: pointer; }
        .toggle-label input { cursor: pointer; }
        .tab-btn {
            padding: 6px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            font-size: 13px;
        }
        .tab-btn.active { background: #333; color: white; border-color: #333; }
        .favorite-btn { color: #ccc; }
        .favorite-btn.favorited { color: #f39c12; }
        .gallery {
            padding: 70px 12px 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .maze-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .maze-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
        }
        .maze-display {
            aspect-ratio: 8.5/11;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            cursor: pointer;
            overflow: hidden;
        }
        .maze-display svg {
            width: 100%;
            height: 100%;
            display: block;
        }
        .card-footer {
            padding: 8px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid #eee;
        }
        .card-info { font-size: 12px; color: #666; }
        .card-info strong { color: #333; }
        .card-actions { display: flex; gap: 8px; }
        .card-actions button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            padding: 4px;
            opacity: 0.6;
            transition: opacity 0.2s;
        }
        .card-actions button:hover { opacity: 1; }
        .loading-more { text-align: center; padding: 40px; color: #888; }
        .solution-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .solution-overlay.open { display: flex; }
        .solution-modal {
            background: white;
            border-radius: 16px;
            max-width: 600px;
            max-height: 90vh;
            overflow: auto;
            position: relative;
            padding: 20px;
        }
        .solution-modal .close-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: #f0f0f0;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
        }
        @media (max-width: 600px) {
            .header { flex-wrap: wrap; gap: 6px; }
            .gallery { grid-template-columns: 1fr; }
        }
        @page { size: letter portrait; margin: 0.5in; }
        @media print {
            .header, .card-footer, .loading-more { display: none !important; }
            body { background: white; }
            .gallery { display: block; padding: 0; }
            .maze-card { box-shadow: none; page-break-after: always; }
            .maze-display { width: 7.5in; height: 10in; padding: 0; }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>MazeJS</h1>
        <select id="theme">
            <option value="classic">Classic</option>
            <option value="ocean">Ocean</option>
            <option value="space">Space</option>
            <option value="garden">Garden</option>
            <option value="candy">Candy</option>
            <option value="jungle">Jungle</option>
        </select>
        <select id="shape">
            <option value="rectangle">Rectangle</option>
            <option value="circle">Circle</option>
            <option value="heart">Heart</option>
            <option value="star">Star</option>
            <option value="hexagon">Hexagon</option>
        </select>
        <select id="difficulty">
            <option value="3">Level 1</option>
            <option value="4" selected>Level 2</option>
            <option value="5">Level 3</option>
            <option value="6">Level 4</option>
            <option value="7">Level 5</option>
            <option value="8">Level 6</option>
            <option value="9">Level 7</option>
            <option value="10">Level 8</option>
            <option value="11">Level 9</option>
            <option value="12">Level 10</option>
        </select>
        <select id="algorithm">
            <option value="recursive_backtracker">Winding</option>
            <option value="prims">Branching</option>
            <option value="kruskals">Random</option>
        </select>
        <input type="number" class="seed-input" id="seed" value="1" min="1" max="99999" title="Seed">
        <label class="toggle-label"><input type="checkbox" id="printMode"> Print Mode</label>
        <button class="tab-btn" id="galleryTab" onclick="showGallery()">Gallery</button>
        <button class="tab-btn" id="favoritesTab" onclick="showFavorites()">Favorites</button>
    </header>

    <main class="gallery" id="gallery"></main>
    <main class="gallery" id="favoritesGallery" style="display:none"></main>
    <div class="loading-more" id="loading">Loading more mazes...</div>
    <div class="loading-more" id="noFavorites" style="display:none">No favorites yet. Click the heart on a maze to add it!</div>

    <div class="solution-overlay" id="solution-overlay" onclick="if(event.target===this)closeSolution()">
        <div class="solution-modal">
            <button class="close-btn" onclick="closeSolution()">&times;</button>
            <div id="solution-display"></div>
        </div>
    </div>

    <script src="maze.js"></script>
    <script>
        const BATCH_SIZE = 12;
        const DEBOUNCE_MS = 200;
        // Difficulty scaling - level 10 is now much harder (was 29x37, now 45x58)
        const ageDifficulty = {
            3: { w: 5, h: 6 },     // Level 1 - very easy
            4: { w: 7, h: 9 },     // Level 2
            5: { w: 10, h: 13 },   // Level 3
            6: { w: 13, h: 17 },   // Level 4
            7: { w: 17, h: 22 },   // Level 5
            8: { w: 21, h: 27 },   // Level 6
            9: { w: 27, h: 35 },   // Level 7
            10: { w: 33, h: 43 },  // Level 8
            11: { w: 39, h: 50 },  // Level 9
            12: { w: 45, h: 58 }   // Level 10 - expert
        };

        let loadedCount = 0;
        let debounceTimer = null;
        let isLoading = false;

        function getSettings() {
            return {
                theme: document.getElementById('theme').value,
                shape: document.getElementById('shape').value,
                difficulty: parseInt(document.getElementById('difficulty').value),
                algorithm: document.getElementById('algorithm').value,
                baseSeed: parseInt(document.getElementById('seed').value) || 1
            };
        }

        function debounceRegenerate() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                loadedCount = 0;
                document.getElementById('gallery').innerHTML = '';
                loadMoreMazes();
            }, DEBOUNCE_MS);
        }

        function loadMoreMazes() {
            if (isLoading) return;
            isLoading = true;

            const s = getSettings();
            const dims = ageDifficulty[s.difficulty] || ageDifficulty[4];
            const gallery = document.getElementById('gallery');

            for (let i = 0; i < BATCH_SIZE; i++) {
                const seed = s.baseSeed + loadedCount;
                const maze = new MazeGenerator(seed).generate(dims.w, dims.h, s.algorithm, s.shape, s.theme);
                gallery.appendChild(createCard(maze, seed, s));
                loadedCount++;
            }
            isLoading = false;
        }

        function createCard(maze, seed, settings) {
            const card = document.createElement('div');
            card.className = 'maze-card';

            const display = document.createElement('div');
            display.className = 'maze-display';
            display.innerHTML = maze.toSVG(false, getPrintMode());
            display.onclick = () => printMaze(maze);

            const footer = document.createElement('div');
            footer.className = 'card-footer';
            const levelNum = settings.difficulty - 2;
            const isFav = isFavorited(seed, settings);
            footer.innerHTML = `
                <div class="card-info"><strong>${settings.theme}</strong> &bull; Level ${levelNum}</div>
                <div class="card-actions">
                    <button class="favorite-btn ${isFav ? 'favorited' : ''}" onclick="event.stopPropagation();toggleFavorite(${seed},this)" title="Favorite">&#9829;</button>
                    <button onclick="event.stopPropagation();showSolution(${seed})" title="Solution">&#128269;</button>
                    <button onclick="event.stopPropagation();printMaze(window.mazeCache[${seed}])" title="Print">&#128424;</button>
                    <button onclick="event.stopPropagation();downloadMaze(window.mazeCache[${seed}],${seed})" title="Download">&#128190;</button>
                </div>
            `;

            card.appendChild(display);
            card.appendChild(footer);

            window.mazeCache = window.mazeCache || {};
            window.mazeCache[seed] = maze;

            return card;
        }

        function showSolution(seed) {
            const maze = window.mazeCache[seed];
            if (maze) {
                document.getElementById('solution-display').innerHTML = maze.toSVG(true, getPrintMode());
                document.getElementById('solution-overlay').classList.add('open');
            }
        }

        function closeSolution() {
            document.getElementById('solution-overlay').classList.remove('open');
        }

        function printMaze(maze) {
            const w = window.open('', '_blank');
            w.document.write(`<!DOCTYPE html><html><head><title>Maze</title>
                <style>@page{size:letter;margin:0.5in}body{display:flex;justify-content:center;align-items:center;height:100vh;margin:0}
                svg{max-width:7.5in;max-height:10in}</style></head><body>${maze.toSVG(false, getPrintMode())}</body></html>`);
            w.document.close();
            setTimeout(() => w.print(), 100);
        }

        function downloadMaze(maze, seed) {
            const blob = new Blob([maze.toSVG(false, getPrintMode())], { type: 'image/svg+xml' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `maze-${seed}.svg`;
            a.click();
        }

        // Print Mode
        function getPrintMode() {
            return document.getElementById('printMode').checked;
        }

        function savePrintMode(enabled) {
            localStorage.setItem('mazejs-printMode', enabled ? 'true' : 'false');
        }

        function loadPrintMode() {
            const saved = localStorage.getItem('mazejs-printMode');
            return saved === 'true';
        }

        // Favorites
        function getFavorites() {
            try {
                return JSON.parse(localStorage.getItem('mazejs-favorites') || '[]');
            } catch { return []; }
        }

        function saveFavorites(favs) {
            localStorage.setItem('mazejs-favorites', JSON.stringify(favs));
        }

        function isFavorited(seed, settings) {
            const favs = getFavorites();
            return favs.some(f => f.seed === seed && f.theme === settings.theme &&
                f.shape === settings.shape && f.difficulty === settings.difficulty &&
                f.algorithm === settings.algorithm);
        }

        function toggleFavorite(seed, btn) {
            const settings = getSettings();
            let favs = getFavorites();
            const idx = favs.findIndex(f => f.seed === seed && f.theme === settings.theme &&
                f.shape === settings.shape && f.difficulty === settings.difficulty &&
                f.algorithm === settings.algorithm);

            if (idx >= 0) {
                favs.splice(idx, 1);
                btn.classList.remove('favorited');
            } else {
                favs.push({
                    seed,
                    theme: settings.theme,
                    shape: settings.shape,
                    difficulty: settings.difficulty,
                    algorithm: settings.algorithm
                });
                btn.classList.add('favorited');
            }
            saveFavorites(favs);
        }

        // Tab switching
        let currentView = 'gallery';

        function showGallery() {
            currentView = 'gallery';
            document.getElementById('gallery').style.display = '';
            document.getElementById('favoritesGallery').style.display = 'none';
            document.getElementById('loading').style.display = '';
            document.getElementById('noFavorites').style.display = 'none';
            document.getElementById('galleryTab').classList.add('active');
            document.getElementById('favoritesTab').classList.remove('active');
        }

        function showFavorites() {
            currentView = 'favorites';
            document.getElementById('gallery').style.display = 'none';
            document.getElementById('favoritesGallery').style.display = '';
            document.getElementById('loading').style.display = 'none';
            document.getElementById('galleryTab').classList.remove('active');
            document.getElementById('favoritesTab').classList.add('active');
            renderFavorites();
        }

        function renderFavorites() {
            const container = document.getElementById('favoritesGallery');
            container.innerHTML = '';
            const favs = getFavorites();

            if (favs.length === 0) {
                document.getElementById('noFavorites').style.display = '';
                return;
            }
            document.getElementById('noFavorites').style.display = 'none';

            for (const fav of favs) {
                const dims = ageDifficulty[fav.difficulty] || ageDifficulty[4];
                const maze = new MazeGenerator(fav.seed).generate(dims.w, dims.h, fav.algorithm, fav.shape, fav.theme);
                window.mazeCache[fav.seed] = maze;
                container.appendChild(createCard(maze, fav.seed, fav));
            }
        }

        // Setup
        document.querySelectorAll('#theme,#shape,#difficulty,#algorithm,#seed').forEach(el => {
            el.addEventListener('change', debounceRegenerate);
            el.addEventListener('input', debounceRegenerate);
        });

        // Print mode toggle
        const printModeCheckbox = document.getElementById('printMode');
        printModeCheckbox.checked = loadPrintMode();
        printModeCheckbox.addEventListener('change', () => {
            savePrintMode(printModeCheckbox.checked);
            debounceRegenerate();
            if (currentView === 'favorites') renderFavorites();
        });

        // Tab default state
        document.getElementById('galleryTab').classList.add('active');

        // Infinite scroll
        new IntersectionObserver(entries => {
            if (entries[0].isIntersecting && currentView === 'gallery') loadMoreMazes();
        }, { threshold: 0.1 }).observe(document.getElementById('loading'));

        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSolution(); });

        // Initial load
        loadMoreMazes();
    </script>
</body>
</html>
